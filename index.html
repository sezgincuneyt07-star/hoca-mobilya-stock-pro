<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#232832">
  <title>HOCA MOBİLYA STOK PRO V11</title>
  <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
  <div id="appLoader" class="app-loader">
    <div class="loader-card">
      <div class="brand-mark">HM</div>
      <strong>HOCA MOBİLYA STOK PRO</strong>
      <span>Uygulama yükleniyor...</span>
    </div>
  </div>

  <iframe
    id="stockAppFrame"
    class="stock-app-frame"
    title="HOCA MOBİLYA Stok Pro"
    allow="clipboard-read; clipboard-write"
    src="https://script.google.com/macros/s/AKfycbzKW87lp7ZpwzvrJr0W36rj_VCScP2MCZJBOdUnU4NX_i2K0fJeUUsjzZapnsT1kjrc/exec">
  </iframe>

  <section id="cameraOverlay" class="camera-overlay hidden" aria-hidden="true">
    <div class="camera-shell">
      <header class="camera-header">
        <div>
          <span>HOCA MOBİLYA STOK PRO</span>
          <strong id="cameraTitle">Hızlı Kamera</strong>
        </div>
        <button id="closeCameraButton" class="icon-button" type="button" aria-label="Kamerayı kapat">×</button>
      </header>

      <div class="camera-stage">
        <video id="cameraVideo" autoplay muted playsinline webkit-playsinline></video>
        <div class="scan-guide" aria-hidden="true"><span></span></div>
        <div id="cameraCover" class="camera-cover">
          <strong>Kamera hazırlanıyor</strong>
          <span id="cameraCoverText">Kamera izni bekleniyor...</span>
        </div>
        <div id="cameraEngine" class="camera-engine">ZXing hazırlanıyor</div>
      </div>

      <div class="camera-toolbar">
        <button id="startCameraButton" class="primary-button" type="button">Kamerayı Başlat</button>
        <button id="switchCameraButton" type="button" disabled>Kamerayı Değiştir</button>
        <button id="torchButton" type="button" disabled>Feneri Aç</button>
      </div>

      <div class="camera-status-grid">
        <article>
          <span>Son barkod</span>
          <strong id="lastBarcode">Henüz okutulmadı</strong>
        </article>
        <article>
          <span>İşlem sonucu</span>
          <strong id="stockResult">Barkod bekleniyor</strong>
        </article>
        <article>
          <span>Başarılı işlem</span>
          <strong id="scanCounter">0</strong>
        </article>
      </div>

      <p id="cameraMessage" class="camera-message">Kamerayı başlatın ve barkodu çerçevenin içine tutun.</p>

      <div class="manual-row">
        <input id="manualBarcode" type="text" inputmode="numeric" autocomplete="off" placeholder="Manuel barkod">
        <button id="manualBarcodeButton" class="primary-button" type="button">Barkodu Kullan</button>
      </div>
    </div>
  </section>

  <script src="https://unpkg.com/@zxing/browser@0.2.0/umd/zxing-browser.min.js"></script>
  <script src="camera.js?v=11"></script>
</body>
</html>
