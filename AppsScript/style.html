<style>
:root {
  --orange: #f47c20;
  --orange-dark: #d9630c;
  --dark: #232832;
  --dark-soft: #2f3541;
  --text: #252a32;
  --muted: #737b88;
  --line: #e5e7eb;
  --bg: #f4f5f7;
  --white: #ffffff;
  --danger: #c83232;
  --success: #198754;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  font-family: Arial, Helvetica, sans-serif;
  color: var(--text);
  background: var(--bg);
}

button,
input,
select {
  font: inherit;
}

button {
  cursor: pointer;
}

.hidden {
  display: none !important;
}

/* LOGIN */

.login-screen {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(circle at 15% 15%, rgba(244, 124, 32, .22), transparent 35%),
    linear-gradient(145deg, var(--dark), #3a414e);
}

.login-card {
  width: min(430px, 100%);
  background: var(--white);
  border-radius: 26px;
  padding: 38px;
  box-shadow: 0 30px 80px rgba(0, 0, 0, .28);
}

.logo-box {
  width: 68px;
  height: 68px;
  display: grid;
  place-items: center;
  border-radius: 20px;
  background: var(--orange);
  color: var(--white);
  font-size: 24px;
  font-weight: 900;
  box-shadow: 0 12px 26px rgba(244, 124, 32, .34);
}

.logo-box.small {
  width: 44px;
  height: 44px;
  border-radius: 13px;
  font-size: 16px;
  box-shadow: none;
}

.login-title {
  margin: 24px 0 28px;
}

.login-title span {
  color: var(--orange);
  font-size: 12px;
  font-weight: 900;
  letter-spacing: .15em;
}

.login-title h1 {
  margin: 6px 0;
  font-size: 34px;
}

.login-title p {
  margin: 0;
  color: var(--muted);
}

.field {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 17px;
}

.field span {
  font-size: 13px;
  font-weight: 800;
  color: #505866;
}

.field input,
.field select {
  width: 100%;
  min-height: 48px;
  padding: 0 14px;
  border: 1px solid var(--line);
  border-radius: 13px;
  outline: none;
  background: var(--white);
}

.field input:focus,
.field select:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 4px rgba(244, 124, 32, .12);
}

.primary-button {
  width: 100%;
  min-height: 48px;
  border: 0;
  border-radius: 13px;
  background: var(--orange);
  color: var(--white);
  font-weight: 900;
}

.primary-button:hover {
  background: var(--orange-dark);
}

.primary-button:disabled {
  opacity: .6;
  cursor: wait;
}

.message {
  min-height: 20px;
  margin: 13px 0 0;
  text-align: center;
  color: var(--danger);
  font-size: 13px;
}

/* APP */

.app {
  min-height: 100vh;
  display: flex;
}

.sidebar {
  position: fixed;
  inset: 0 auto 0 0;
  width: 270px;
  padding: 22px 18px;
  display: flex;
  flex-direction: column;
  background: var(--dark);
  color: var(--white);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 6px 22px;
  border-bottom: 1px solid rgba(255,255,255,.09);
}

.brand strong,
.brand span {
  display: block;
}

.brand strong {
  font-size: 14px;
}

.brand span {
  margin-top: 4px;
  color: #adb5c1;
  font-size: 12px;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 18px 0;
}

.menu-item {
  padding: 13px 14px;
  border: 0;
  border-radius: 11px;
  background: transparent;
  color: #bcc3ce;
  text-align: left;
  font-weight: 800;
}

.menu-item:hover,
.menu-item.active {
  background: rgba(244, 124, 32, .18);
  color: var(--white);
}

.menu-item.active {
  box-shadow: inset 3px 0 0 var(--orange);
}

.sidebar-bottom {
  margin-top: auto;
}

.user-box {
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,.08);
}

.user-box strong,
.user-box span {
  display: block;
}

.user-box span {
  margin-top: 4px;
  color: #aeb5c0;
  font-size: 12px;
}

.logout-button {
  width: 100%;
  min-height: 44px;
  border: 0;
  border-radius: 11px;
  background: rgba(255,255,255,.08);
  color: var(--white);
  font-weight: 800;
}

.content {
  width: 100%;
  margin-left: 270px;
}

.topbar {
  min-height: 86px;
  display: flex;
  align-items: center;
  padding: 18px 30px;
  border-bottom: 1px solid var(--line);
  background: rgba(244, 245, 247, .95);
}

.topbar h2 {
  margin: 0;
  font-size: 23px;
}

.topbar p {
  margin: 5px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.page {
  display: none;
  padding: 28px 30px 42px;
}

.page.active {
  display: block;
}

.welcome-card,
.placeholder-card,
.feature-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--white);
  box-shadow: 0 14px 35px rgba(29, 35, 45, .07);
}

.welcome-card {
  padding: 30px;
  margin-bottom: 22px;
  border-top: 5px solid var(--orange);
}

.welcome-label {
  color: var(--success);
  font-size: 12px;
  font-weight: 900;
  letter-spacing: .11em;
}

.welcome-card h3 {
  margin: 10px 0 8px;
  font-size: 27px;
}

.welcome-card p,
.placeholder-card p {
  color: var(--muted);
  line-height: 1.6;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 16px;
}

.feature-card {
  padding: 22px;
}

.feature-card strong,
.feature-card span {
  display: block;
}

.feature-card strong {
  margin-bottom: 8px;
  font-size: 17px;
}

.feature-card span {
  color: var(--muted);
  line-height: 1.5;
  font-size: 13px;
}

.placeholder-card {
  padding: 28px;
}

.placeholder-card h3 {
  margin-top: 0;
}

.toast {
  position: fixed;
  top: 18px;
  right: 18px;
  z-index: 100;
  max-width: 380px;
  padding: 14px 18px;
  border-radius: 12px;
  color: var(--white);
  background: var(--dark-soft);
  box-shadow: 0 16px 40px rgba(0,0,0,.2);
}

.toast.success {
  background: var(--success);
}

.toast.error {
  background: var(--danger);
}

/* STOK İŞLEMİ */

.stock-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(360px, .9fr);
  gap: 22px;
  align-items: start;
}

.operation-card,
.product-card,
.usage-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--white);
  box-shadow: 0 14px 35px rgba(29, 35, 45, .07);
}

.operation-card,
.product-card {
  padding: 26px;
}

.section-heading {
  margin-bottom: 24px;
}

.section-heading h3 {
  margin: 7px 0 6px;
  font-size: 22px;
}

.section-heading p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
}

.section-label {
  color: var(--orange);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .13em;
}

.barcode-row {
  display: flex;
  gap: 10px;
}

.barcode-row input {
  flex: 1;
  min-width: 0;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: .03em;
}

.secondary-button {
  min-width: 122px;
  min-height: 48px;
  padding: 0 16px;
  border: 1px solid var(--line);
  border-radius: 13px;
  background: #f0f2f5;
  color: var(--text);
  font-weight: 900;
}

.secondary-button:hover {
  background: #e7eaee;
}

.operation-options {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin: 22px 0;
}

.operation-option {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  min-height: 92px;
  padding: 16px;
  border: 2px solid var(--line);
  border-radius: 15px;
  cursor: pointer;
  transition: border-color .18s ease, background .18s ease;
}

.operation-option input {
  width: 18px;
  height: 18px;
  margin-top: 2px;
  accent-color: var(--orange);
}

.operation-option strong,
.operation-option small {
  display: block;
}

.operation-option strong {
  margin-bottom: 7px;
  font-size: 15px;
}

.operation-option small {
  color: var(--muted);
  line-height: 1.4;
}

.operation-option.selected {
  border-color: var(--orange);
  background: #fff7f0;
}

.quantity-field {
  max-width: 240px;
}

.quantity-control {
  display: grid;
  grid-template-columns: 46px minmax(70px, 1fr) 46px;
}

.quantity-control button,
.quantity-control input {
  min-height: 48px;
  border: 1px solid var(--line);
  background: var(--white);
  text-align: center;
  font-weight: 900;
}

.quantity-control button:first-child {
  border-radius: 13px 0 0 13px;
}

.quantity-control button:last-child {
  border-radius: 0 13px 13px 0;
}

.quantity-control input {
  border-left: 0;
  border-right: 0;
  border-radius: 0;
  font-size: 18px;
}

.stock-action-row {
  display: grid;
  grid-template-columns: 1fr 150px;
  gap: 12px;
  margin-top: 24px;
}

.action-button {
  min-height: 52px;
}

.quick-button {
  border: 0;
  border-radius: 13px;
  background: var(--success);
  color: var(--white);
  font-weight: 900;
}

.quick-button:hover {
  background: #146f46;
}

.camera-fast-card {
  padding: 18px;
  margin-top: 18px;
  border: 1px solid #dce1e7;
  border-radius: 16px;
  background: #f7f8fa;
}

.camera-fast-header {
  display: flex;
  gap: 16px;
  align-items: center;
  justify-content: space-between;
}

.camera-fast-header strong,
.camera-fast-header small {
  display: block;
}

.camera-fast-header strong {
  margin: 6px 0;
  font-size: 15px;
}

.camera-fast-header small {
  color: var(--muted);
  line-height: 1.45;
}

.camera-start-button {
  min-width: 150px;
  min-height: 45px;
  padding: 0 15px;
  border: 0;
  border-radius: 12px;
  background: var(--dark);
  color: var(--white);
  font-weight: 900;
}

.camera-start-button.active {
  background: var(--danger);
}

.camera-area {
  position: relative;
  overflow: hidden;
  margin-top: 16px;
  border-radius: 15px;
  background: #111;
  aspect-ratio: 4 / 3;
}

.camera-area video {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}

.camera-guide {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  pointer-events: none;
}

.camera-guide::before {
  content: "";
  width: min(82%, 430px);
  height: 34%;
  border: 3px solid rgba(255, 255, 255, .92);
  border-radius: 15px;
  box-shadow: 0 0 0 999px rgba(0, 0, 0, .30);
}

.camera-guide span {
  position: absolute;
  width: min(72%, 360px);
  height: 2px;
  background: #ff7a18;
  box-shadow: 0 0 10px rgba(255, 122, 24, .9);
  animation: cameraScanLine 1.5s ease-in-out infinite alternate;
}

@keyframes cameraScanLine {
  from { transform: translateY(-52px); }
  to { transform: translateY(52px); }
}

.camera-status {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 12px;
  z-index: 2;
  padding: 10px 12px;
  border-radius: 10px;
  background: rgba(20, 24, 30, .84);
  color: #fff;
  text-align: center;
  font-size: 12px;
  font-weight: 800;
}

.camera-status.success {
  background: rgba(25, 135, 84, .92);
}

.camera-status.error {
  background: rgba(198, 40, 40, .92);
}

@media (max-width: 600px) {
  .camera-fast-header {
    align-items: stretch;
    flex-direction: column;
  }

  .camera-start-button {
    width: 100%;
  }
}

.stock-message {
  min-height: 22px;
  margin: 15px 0 0;
  font-size: 13px;
  font-weight: 800;
}

.stock-message.error {
  color: var(--danger);
}

.stock-message.success {
  color: var(--success);
}

.product-empty {
  min-height: 315px;
  display: grid;
  place-items: center;
  align-content: center;
  gap: 10px;
  padding: 25px;
  border: 1px dashed #d8dce2;
  border-radius: 16px;
  color: var(--muted);
  text-align: center;
}

.product-empty-icon {
  width: 60px;
  height: 60px;
  display: grid;
  place-items: center;
  border-radius: 18px;
  background: #fff3e9;
  color: var(--orange);
  font-size: 29px;
}

.product-empty strong {
  color: var(--text);
  font-size: 17px;
}

.product-empty span {
  max-width: 320px;
  line-height: 1.5;
  font-size: 13px;
}

.product-name {
  padding-bottom: 18px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

.product-name h4 {
  margin: 10px 0 5px;
  font-size: 25px;
}

.product-name p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
}

.product-badge {
  display: inline-flex;
  align-items: center;
  min-height: 27px;
  padding: 0 10px;
  border-radius: 999px;
  background: #fff0e3;
  color: #bf5708;
  font-size: 11px;
  font-weight: 900;
}

.product-info-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 11px;
}

.product-info-grid > div {
  min-height: 80px;
  padding: 14px;
  border-radius: 13px;
  background: #f5f6f8;
}

.product-info-grid span,
.product-info-grid strong {
  display: block;
}

.product-info-grid span {
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}

.product-info-grid strong {
  font-size: 15px;
}

.product-info-grid .stock-highlight {
  background: var(--dark);
  color: var(--white);
}

.product-info-grid .stock-highlight span {
  color: #c7ccd4;
}

.product-info-grid .stock-highlight strong {
  font-size: 28px;
}

.usage-card {
  display: flex;
  gap: 14px;
  align-items: center;
  padding: 17px 20px;
  margin-top: 18px;
  border-left: 5px solid var(--orange);
}

.usage-card strong {
  white-space: nowrap;
}

.usage-card span {
  color: var(--muted);
  line-height: 1.5;
  font-size: 13px;
}

@media (max-width: 1000px) {
  .stock-layout {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 600px) {
  .barcode-row {
    display: grid;
  }

  .operation-options {
    grid-template-columns: 1fr;
  }

  .stock-action-row {
    grid-template-columns: 1fr;
  }

  .quantity-field {
    max-width: none;
  }

  .product-info-grid {
    grid-template-columns: 1fr;
  }

  .usage-card {
    align-items: flex-start;
    flex-direction: column;
  }
}

@media (max-width: 1000px) {
  .card-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 760px) {
  .sidebar {
    position: static;
    width: 100%;
  }

  .app {
    display: block;
  }

  .content {
    margin-left: 0;
  }

  .menu {
    display: grid;
    grid-template-columns: repeat(2, minmax(0,1fr));
  }

  .sidebar-bottom {
    margin-top: 10px;
  }

  .card-grid {
    grid-template-columns: 1fr;
  }

  .page,
  .topbar {
    padding-left: 16px;
    padding-right: 16px;
  }
}

/* AYRI HIZLI KAMERA MENÜSÜ */

.camera-page-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.25fr) minmax(300px, .75fr);
  gap: 22px;
  align-items: start;
}

.camera-page-card,
.camera-help-card {
  padding: 26px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--white);
  box-shadow: 0 14px 35px rgba(29, 35, 45, .07);
}

.camera-mode-toolbar {
  display: flex;
  gap: 18px;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  margin-bottom: 18px;
  border: 1px solid #dce1e7;
  border-radius: 15px;
  background: #f7f8fa;
}

.camera-mode-info strong,
.camera-mode-info span {
  display: block;
}

.camera-mode-info strong {
  margin-bottom: 5px;
  font-size: 15px;
}

.camera-mode-info span {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.45;
}

.camera-page-view {
  margin-top: 0;
  min-height: 360px;
}

.camera-result-panel {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 11px;
  margin-top: 16px;
}

.camera-result-panel > div {
  min-height: 82px;
  padding: 14px;
  border-radius: 13px;
  background: #f5f6f8;
}

.camera-result-panel span,
.camera-result-panel strong {
  display: block;
}

.camera-result-panel span {
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}

.camera-result-panel strong {
  overflow-wrap: anywhere;
  font-size: 14px;
}

.camera-help-card h3 {
  margin: 8px 0 22px;
  font-size: 21px;
}

.camera-help-step {
  display: grid;
  grid-template-columns: 38px 1fr;
  gap: 12px;
  align-items: center;
  padding: 13px 0;
  border-bottom: 1px solid var(--line);
}

.camera-help-step strong {
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  border-radius: 10px;
  background: #fff0e3;
  color: var(--orange);
}

.camera-help-step span {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
}

.camera-warning {
  padding: 14px;
  margin-top: 18px;
  border-radius: 13px;
  background: #fff8df;
  color: #765700;
  font-size: 12px;
  line-height: 1.55;
}

@media (max-width: 1000px) {
  .camera-page-layout {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 700px) {
  .camera-mode-toolbar {
    align-items: stretch;
    flex-direction: column;
  }

  .camera-result-panel {
    grid-template-columns: 1fr;
  }

  .camera-page-view {
    min-height: 270px;
  }
}


/* DASHBOARD */
.dashboard-welcome{display:flex;gap:20px;align-items:center;justify-content:space-between;padding:25px 27px;border-radius:18px;background:linear-gradient(135deg,rgba(255,122,24,.96),rgba(218,87,0,.96));color:#fff;box-shadow:0 16px 38px rgba(220,87,0,.18)}
.dashboard-welcome h3{margin:8px 0;font-size:clamp(24px,3vw,34px)}
.dashboard-welcome p{margin:0;color:rgba(255,255,255,.88);line-height:1.55}
.dashboard-refresh{border-color:rgba(255,255,255,.42);background:rgba(255,255,255,.15);color:#fff}
.dashboard-summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:17px;margin-top:19px}
.dashboard-stat-card{padding:21px;border:1px solid var(--line);border-radius:17px;background:var(--white);box-shadow:0 12px 28px rgba(29,35,45,.055)}
.dashboard-stat-card span,.dashboard-stat-card strong,.dashboard-stat-card small{display:block}
.dashboard-stat-card span{color:var(--muted);font-size:12px;font-weight:800}
.dashboard-stat-card strong{margin:9px 0 5px;font-size:34px}
.dashboard-stat-card small{color:var(--muted)}
.dashboard-stat-warning{border-color:#f1d7ad;background:#fffaf1}
.dashboard-stat-warning strong{color:#bd6a00}
.dashboard-category-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:13px;margin-top:15px}
.dashboard-category-card{min-height:124px;padding:19px;border:1px solid var(--line);border-radius:16px;background:var(--white);color:var(--text);text-align:left}
.dashboard-category-card span,.dashboard-category-card strong,.dashboard-category-card small{display:block}
.dashboard-category-card span{font-weight:900}
.dashboard-category-card strong{margin:11px 0 5px;color:var(--orange);font-size:28px}
.dashboard-category-card small{color:var(--muted)}
.dashboard-content-grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(300px,.65fr);gap:18px;margin-top:18px}
.dashboard-panel{padding:23px;border:1px solid var(--line);border-radius:18px;background:var(--white);box-shadow:0 12px 28px rgba(29,35,45,.055)}
.dashboard-panel-heading{display:flex;gap:15px;align-items:center;justify-content:space-between;margin-bottom:18px}
.dashboard-panel-heading h3{margin:7px 0 0;font-size:20px}
.dashboard-count-badge{padding:7px 10px;border-radius:999px;background:#fff0e3;color:#b65308;font-size:11px;font-weight:900}
.dashboard-loading,.dashboard-empty{min-height:170px;display:grid;place-items:center;align-content:center;gap:7px;padding:20px;border:1px dashed #d8dce2;border-radius:14px;color:var(--muted);text-align:center}
.dashboard-empty strong{color:var(--text)}
.critical-products-list{display:grid;gap:10px;max-height:430px;overflow:auto}
.critical-product-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:15px;align-items:center;padding:14px 15px;border:1px solid #ebeef1;border-radius:13px;background:#fafbfc}
.critical-product-main strong,.critical-product-main span{display:block}
.critical-product-main strong{margin-bottom:5px;font-size:14px}
.critical-product-main span{color:var(--muted);font-size:11px;line-height:1.45}
.critical-product-stock{min-width:78px;padding:10px;border-radius:11px;background:#fff1e7;color:#b34f00;text-align:center}
.critical-product-stock strong,.critical-product-stock span{display:block}
.critical-product-stock strong{font-size:22px}
.critical-product-stock span{font-size:10px;font-weight:800}
.dashboard-shortcuts{display:grid;align-content:start;gap:10px}
.dashboard-shortcut{padding:15px;border:1px solid var(--line);border-radius:13px;background:#f8f9fa;color:var(--text);text-align:left}
.dashboard-shortcut strong,.dashboard-shortcut span{display:block}
.dashboard-shortcut strong{margin-bottom:5px}
.dashboard-shortcut span{color:var(--muted);font-size:11px}
@media(max-width:1000px){.dashboard-content-grid{grid-template-columns:1fr}.dashboard-category-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:700px){.dashboard-welcome{align-items:stretch;flex-direction:column}.dashboard-refresh{width:100%}.dashboard-summary-grid{grid-template-columns:1fr}}
@media(max-width:430px){.dashboard-category-grid{grid-template-columns:1fr}.critical-product-row{grid-template-columns:1fr}}


/* ÜRÜN YÖNETİMİ */

.products-toolbar {
  display: flex;
  gap: 20px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 17px;
}

.products-toolbar h3 {
  margin: 7px 0;
  font-size: 25px;
}

.products-toolbar p {
  margin: 0;
  color: var(--muted);
}

.products-search-card {
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--white);
}

.products-search-card label {
  display: block;
  margin-bottom: 8px;
  font-size: 12px;
  font-weight: 900;
}

.products-search-card small {
  display: block;
  margin-top: 8px;
  color: var(--muted);
}

.products-search-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
}

.products-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(340px, .95fr);
  gap: 18px;
  margin-top: 18px;
}

.products-list-card,
.product-management-detail-card {
  min-height: 510px;
  padding: 21px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--white);
  box-shadow: 0 12px 28px rgba(29, 35, 45, .05);
}

.products-list-heading {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 15px;
}

.products-list-heading strong,
.products-list-heading span {
  display: block;
}

.products-list-heading span {
  margin-top: 4px;
  color: var(--muted);
  font-size: 11px;
}

.text-button {
  padding: 8px;
  border: 0;
  background: transparent;
  color: var(--orange);
  font-weight: 900;
}

.products-state {
  min-height: 360px;
  display: grid;
  place-items: center;
  align-content: center;
  gap: 7px;
  padding: 24px;
  border: 1px dashed #d7dce2;
  border-radius: 14px;
  color: var(--muted);
  text-align: center;
}

.products-state strong {
  color: var(--text);
}

.products-search-list {
  display: grid;
  gap: 9px;
  max-height: 545px;
  overflow: auto;
  padding-right: 4px;
}

.product-search-result {
  width: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 13px;
  align-items: center;
  padding: 14px;
  border: 1px solid #e9edf1;
  border-radius: 13px;
  background: #fafbfc;
  color: var(--text);
  text-align: left;
  transition: .18s ease;
}

.product-search-result:hover,
.product-search-result.active {
  border-color: #f0aa72;
  background: #fff8f2;
}

.product-search-result-main strong,
.product-search-result-main span {
  display: block;
}

.product-search-result-main strong {
  margin-bottom: 5px;
}

.product-search-result-main span {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.5;
}

.product-search-result-stock {
  min-width: 68px;
  padding: 9px;
  border-radius: 11px;
  background: #edf1f5;
  text-align: center;
}

.product-search-result-stock strong,
.product-search-result-stock span {
  display: block;
}

.product-search-result-stock strong {
  font-size: 20px;
}

.product-search-result-stock span {
  margin-top: 2px;
  color: var(--muted);
  font-size: 9px;
  font-weight: 900;
}

.management-product-header {
  display: flex;
  gap: 15px;
  align-items: flex-start;
  justify-content: space-between;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--line);
}

.management-product-header h3 {
  margin: 9px 0 5px;
  font-size: 23px;
}

.management-product-header p {
  margin: 0;
  color: var(--muted);
  font-size: 12px;
}

.management-status-badge {
  padding: 7px 10px;
  border-radius: 999px;
  background: #e8f7ee;
  color: #237744;
  font-size: 11px;
  font-weight: 900;
}

.management-status-badge.passive {
  background: #fff0ec;
  color: #a9442a;
}

.management-product-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 11px;
  margin-top: 18px;
}

.management-product-grid > div {
  padding: 14px;
  border-radius: 13px;
  background: #f6f7f9;
}

.management-product-grid span,
.management-product-grid strong {
  display: block;
}

.management-product-grid span {
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 900;
}

.management-product-actions {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}

.management-product-actions button {
  flex: 1;
}

.danger-outline-button {
  padding: 12px 16px;
  border: 1px solid #df876f;
  border-radius: 11px;
  background: #fff;
  color: #a64028;
  font-weight: 900;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: grid;
  place-items: center;
  padding: 20px;
  background: rgba(14, 18, 24, .62);
  backdrop-filter: blur(5px);
}

.modal-card {
  width: min(760px, 100%);
  max-height: 92vh;
  overflow: auto;
  padding: 24px;
  border-radius: 19px;
  background: var(--white);
  box-shadow: 0 30px 80px rgba(0, 0, 0, .25);
}

.modal-heading {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-heading h3 {
  margin: 7px 0 0;
  font-size: 24px;
}

.modal-close-button {
  width: 38px;
  height: 38px;
  border: 0;
  border-radius: 11px;
  background: #f1f3f5;
  font-size: 25px;
}

.product-form {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 15px;
}

.product-form label span {
  display: block;
  margin-bottom: 7px;
  font-size: 11px;
  font-weight: 900;
}

.product-form-wide {
  grid-column: 1 / -1;
}

.product-form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 4px;
}

@media (max-width: 980px) {
  .products-layout {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 700px) {
  .products-toolbar {
    align-items: stretch;
    flex-direction: column;
  }

  .products-search-row,
  .product-form {
    grid-template-columns: 1fr;
  }

  .product-form-wide {
    grid-column: auto;
  }

  .management-product-grid {
    grid-template-columns: 1fr;
  }

  .management-product-actions,
  .product-form-actions {
    flex-direction: column;
  }
}


/* GÜNLÜK KONTROL */

.daily-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 17px;
}

.daily-toolbar h3 {
  margin: 7px 0;
  font-size: 25px;
}

.daily-toolbar p {
  margin: 0;
  color: var(--muted);
}

.daily-filter-card {
  display: grid;
  grid-template-columns: 170px 210px 190px minmax(240px, 1fr);
  gap: 13px;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--white);
}

.daily-filter-card label span {
  display: block;
  margin-bottom: 7px;
  font-size: 10px;
  font-weight: 900;
  color: var(--muted);
}

.daily-summary-cards {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 13px;
  margin: 17px 0;
}

.daily-summary-card {
  padding: 17px;
  border: 1px solid var(--line);
  border-radius: 15px;
  background: var(--white);
  box-shadow: 0 9px 22px rgba(29, 35, 45, .04);
}

.daily-summary-card span,
.daily-summary-card strong {
  display: block;
}

.daily-summary-card span {
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 900;
}

.daily-summary-card strong {
  font-size: 25px;
}

.daily-content-card {
  min-height: 430px;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--white);
  box-shadow: 0 12px 28px rgba(29, 35, 45, .05);
}

.daily-tabs {
  display: flex;
  gap: 7px;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}

.daily-tab {
  padding: 10px 14px;
  border: 1px solid #dfe3e8;
  border-radius: 10px;
  background: #f5f6f8;
  color: var(--muted);
  font-weight: 900;
}

.daily-tab.active {
  border-color: var(--orange);
  background: #fff5ed;
  color: var(--orange);
}

.daily-state {
  min-height: 310px;
  display: grid;
  place-items: center;
  align-content: center;
  gap: 7px;
  color: var(--muted);
  text-align: center;
}

.daily-state strong {
  color: var(--text);
}

.daily-table-wrap {
  width: 100%;
  overflow-x: auto;
}

.daily-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 820px;
}

.daily-table th {
  padding: 11px 12px;
  border-bottom: 1px solid var(--line);
  color: var(--muted);
  font-size: 9px;
  font-weight: 900;
  text-align: left;
  white-space: nowrap;
}

.daily-table td {
  padding: 13px 12px;
  border-bottom: 1px solid #edf0f3;
  font-size: 12px;
  vertical-align: middle;
}

.daily-table tbody tr:hover {
  background: #fafbfc;
}

.daily-product-name strong,
.daily-product-name span {
  display: block;
}

.daily-product-name span {
  margin-top: 4px;
  color: var(--muted);
  font-size: 10px;
}

.daily-quantity-badge {
  display: inline-flex;
  min-width: 45px;
  justify-content: center;
  padding: 6px 9px;
  border-radius: 999px;
  background: #eaf7ef;
  color: #217744;
  font-weight: 900;
}

.daily-stock-change {
  color: var(--muted);
  white-space: nowrap;
}

@media (max-width: 1100px) {
  .daily-filter-card {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .daily-summary-cards {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 650px) {
  .daily-toolbar {
    align-items: stretch;
    flex-direction: column;
  }

  .daily-filter-card,
  .daily-summary-cards {
    grid-template-columns: 1fr;
  }

  .daily-tabs {
    overflow-x: auto;
  }
}


/* TOPLU STOK */

.bulk-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 17px;
}

.bulk-toolbar h3 {
  margin: 7px 0;
  font-size: 25px;
}

.bulk-toolbar p {
  margin: 0;
  color: var(--muted);
}

.bulk-group-cards {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 13px;
  margin-bottom: 17px;
}

.bulk-group-card {
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--white);
  color: var(--text);
  text-align: left;
  box-shadow: 0 9px 22px rgba(29, 35, 45, .04);
  transition: .18s ease;
}

.bulk-group-card:hover,
.bulk-group-card.active {
  transform: translateY(-2px);
  border-color: #efab76;
  background: #fff8f2;
  box-shadow: 0 14px 28px rgba(241, 115, 31, .09);
}

.bulk-group-card span,
.bulk-group-card strong,
.bulk-group-card small {
  display: block;
}

.bulk-group-card span {
  color: var(--muted);
  font-size: 10px;
  font-weight: 900;
}

.bulk-group-card strong {
  margin: 8px 0 5px;
  font-size: 28px;
}

.bulk-group-card small {
  color: var(--muted);
}

.bulk-list-card {
  min-height: 470px;
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--white);
  box-shadow: 0 12px 28px rgba(29, 35, 45, .05);
}

.bulk-list-heading {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 18px;
  padding-bottom: 17px;
  border-bottom: 1px solid var(--line);
}

.bulk-list-heading h3 {
  margin: 8px 0 5px;
  font-size: 22px;
}

.bulk-list-heading p {
  margin: 0;
  color: var(--muted);
  font-size: 11px;
}

.bulk-list-actions {
  display: grid;
  grid-template-columns: minmax(230px, 1fr) 180px;
  gap: 10px;
  width: min(500px, 100%);
}

.bulk-state {
  min-height: 330px;
  display: grid;
  place-items: center;
  align-content: center;
  gap: 7px;
  color: var(--muted);
  text-align: center;
}

.bulk-state strong {
  color: var(--text);
}

.bulk-table-wrap {
  width: 100%;
  overflow-x: auto;
  margin-top: 13px;
}

.bulk-table {
  width: 100%;
  min-width: 1080px;
  border-collapse: collapse;
}

.bulk-table th {
  padding: 11px 10px;
  border-bottom: 1px solid var(--line);
  color: var(--muted);
  font-size: 9px;
  font-weight: 900;
  text-align: left;
  white-space: nowrap;
}

.bulk-table td {
  padding: 13px 10px;
  border-bottom: 1px solid #edf0f3;
  font-size: 11px;
  vertical-align: middle;
}

.bulk-table tbody tr:hover {
  background: #fafbfc;
}

.bulk-product-cell strong,
.bulk-product-cell span {
  display: block;
}

.bulk-product-cell span {
  margin-top: 4px;
  color: var(--muted);
  font-size: 9px;
}

.bulk-stock-number {
  font-size: 18px;
  font-weight: 900;
}

.bulk-status-badge {
  display: inline-flex;
  padding: 6px 9px;
  border-radius: 999px;
  background: #e9f7ef;
  color: #237744;
  font-size: 9px;
  font-weight: 900;
  white-space: nowrap;
}

.bulk-status-badge.critical {
  background: #fff2e7;
  color: #a65319;
}

.bulk-status-badge.zero {
  background: #fdecea;
  color: #a43e2c;
}

.bulk-row-action {
  padding: 8px 10px;
  border: 1px solid #dfe3e8;
  border-radius: 9px;
  background: #fff;
  color: var(--text);
  font-size: 10px;
  font-weight: 900;
  white-space: nowrap;
}

@media (max-width: 1000px) {
  .bulk-group-cards {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .bulk-list-heading {
    align-items: stretch;
    flex-direction: column;
  }

  .bulk-list-actions {
    width: 100%;
  }
}

@media (max-width: 650px) {
  .bulk-toolbar {
    align-items: stretch;
    flex-direction: column;
  }

  .bulk-group-cards {
    grid-template-columns: 1fr;
  }

  .bulk-list-actions {
    grid-template-columns: 1fr;
  }
}


/* TAM KAMERA MODÜLÜ */

.camera-control-grid {
  display: grid;
  grid-template-columns: minmax(180px, 1fr) minmax(170px, .8fr) auto auto;
  gap: 10px;
  align-items: end;
  margin: 17px 0;
}

.camera-control-grid label span,
.camera-manual-card label {
  display: block;
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 900;
}

.camera-engine-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 4;
  padding: 6px 9px;
  border-radius: 999px;
  background: rgba(17, 22, 29, .78);
  color: white;
  font-size: 9px;
  font-weight: 900;
  backdrop-filter: blur(6px);
}

.camera-manual-card {
  margin-top: 14px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fafbfc;
}

.camera-manual-card > div {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 9px;
}

.camera-recent-empty {
  padding: 22px;
  border: 1px dashed #d8dde2;
  border-radius: 13px;
  color: var(--muted);
  text-align: center;
  font-size: 11px;
}

.camera-recent-list {
  display: grid;
  gap: 8px;
  max-height: 430px;
  overflow: auto;
  margin-bottom: 14px;
}

.camera-recent-item {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  padding: 12px;
  border: 1px solid #e8ecf0;
  border-radius: 12px;
  background: #fafbfc;
}

.camera-recent-item strong,
.camera-recent-item span {
  display: block;
}

.camera-recent-item strong {
  margin-bottom: 4px;
  font-size: 12px;
}

.camera-recent-item span {
  color: var(--muted);
  font-size: 9px;
}

.camera-recent-stock {
  padding: 7px 9px;
  border-radius: 999px;
  background: #e9f7ef;
  color: #237744;
  font-size: 10px;
  font-weight: 900;
  white-space: nowrap;
}

@media (max-width: 920px) {
  .camera-control-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 600px) {
  .camera-control-grid,
  .camera-manual-card > div {
    grid-template-columns: 1fr;
  }
}


/* STOK İŞLEMİ KAMERA */

.stock-barcode-row {
  grid-template-columns: minmax(0, 1fr) auto auto;
}

.stock-camera-modal-card {
  width: min(720px, calc(100vw - 26px));
}

.stock-camera-controls {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
  margin: 14px 0;
}

.stock-camera-view,
.stock-camera-view video {
  min-height: 350px;
}

.stock-camera-view video {
  width: 100%;
  object-fit: cover;
}

@media (max-width: 650px) {
  .stock-barcode-row,
  .stock-camera-controls {
    grid-template-columns: 1fr;
  }

  .stock-camera-view,
  .stock-camera-view video {
    min-height: 290px;
  }
}


/* APPS SCRIPT KAMERA UYUMLULUK */

.camera-compatibility-notice {
  margin: 14px 0;
  padding: 13px 15px;
  border: 1px solid #f0c59f;
  border-radius: 13px;
  background: #fff8f1;
  color: #815025;
  font-size: 11px;
  line-height: 1.55;
}

.camera-control-grid {
  grid-template-columns: minmax(220px, 340px);
}

.capture-preview {
  display: block;
  max-width: 100%;
  max-height: 280px;
  margin: 12px auto;
  border-radius: 12px;
  object-fit: contain;

<style>
/* ========================================================
   V16 MOBİL MENÜ VE KULLANILABİLİR SAYFA DÜZENİ
   ======================================================== */
.mobile-bottom-nav,
.mobile-menu-backdrop {
  display: none;
}

@media (max-width: 760px) {
  html,
  body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
  }

  body.mobile-menu-open {
    overflow: hidden;
  }

  .app {
    display: block;
    min-height: 100dvh;
    padding-bottom: calc(78px + env(safe-area-inset-bottom));
  }

  .sidebar {
    display: none !important;
  }

  .content {
    width: 100%;
    max-width: 100%;
    margin-left: 0 !important;
    overflow-x: hidden;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 35;
    min-height: 68px;
    padding: 9px 12px;
    background: rgba(244, 241, 233, .97);
    box-shadow: 0 7px 22px rgba(31, 29, 24, .08);
  }

  .topbar-logo {
    width: 42px;
    height: 42px;
  }

  .topbar h2 {
    max-width: calc(100vw - 88px);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 18px;
  }

  .topbar p {
    max-width: calc(100vw - 88px);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .page {
    width: 100%;
    max-width: 100%;
    padding: 14px 12px 30px;
    overflow-x: hidden;
  }

  .operation-card,
  .product-card,
  .usage-card,
  .dashboard-panel,
  .dashboard-stat-card,
  .dashboard-category-card,
  .placeholder-card,
  .feature-card,
  .camera-page-card,
  .personnel-list-card,
  .personnel-editor-card,
  .movements-filter-card,
  .reports-filter-card {
    border-radius: 16px;
  }

  .operation-card,
  .product-card,
  .dashboard-panel,
  .placeholder-card,
  .camera-page-card {
    padding: 16px 14px;
  }

  .stock-layout,
  .dashboard-content-grid,
  .product-management-layout,
  .personnel-management-layout,
  .camera-page-layout,
  .hybrid-camera-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) !important;
    gap: 14px;
  }

  .barcode-row,
  .stock-action-row,
  .modal-actions,
  .product-form-actions,
  .movements-header-actions,
  .reports-header-actions {
    display: grid;
    grid-template-columns: minmax(0, 1fr) !important;
    gap: 10px;
  }

  .barcode-row > *,
  .stock-action-row > *,
  .modal-actions > *,
  .product-form-actions > * {
    width: 100%;
    min-width: 0;
  }

  .field input,
  .field select,
  .primary-button,
  .secondary-button,
  .quick-button {
    min-height: 50px;
  }

  .table-wrap,
  .report-table-wrap,
  .movements-table-wrap,
  .bulk-table-wrap {
    max-width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .modal-backdrop {
    align-items: flex-end;
    padding: 0;
  }

  .modal-card {
    width: 100%;
    max-width: none;
    max-height: 92dvh;
    overflow-y: auto;
    border-radius: 22px 22px 0 0;
    padding: 20px 14px calc(18px + env(safe-area-inset-bottom));
  }

  .mobile-bottom-nav {
    position: fixed;
    inset: auto 0 0 0;
    z-index: 100;
    height: calc(70px + env(safe-area-inset-bottom));
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 3px;
    padding: 7px 7px calc(7px + env(safe-area-inset-bottom));
    border-top: 1px solid rgba(200,164,93,.32);
    background: rgba(16,18,23,.98);
    box-shadow: 0 -15px 35px rgba(0,0,0,.25);
    backdrop-filter: blur(14px);
  }

  .mobile-nav-item {
    min-width: 0;
    min-height: 55px;
    display: grid;
    grid-template-rows: 25px auto;
    place-items: center;
    gap: 1px;
    padding: 5px 2px;
    border: 0;
    border-radius: 12px;
    color: #bfc2c8;
    background: transparent;
    font-size: 10px;
    font-weight: 800;
  }

  .mobile-nav-icon {
    font-size: 23px;
    line-height: 1;
  }

  .mobile-nav-item.active {
    color: #f5dfaa;
    background: rgba(200,164,93,.16);
    box-shadow: inset 0 -3px 0 #c8a45d;
  }

  .mobile-nav-camera {
    color: #17191e;
    background: linear-gradient(135deg, #e0c480, #a77e34);
    transform: translateY(-9px);
    box-shadow: 0 10px 25px rgba(0,0,0,.32);
  }

  .mobile-nav-camera.active {
    color: #111318;
    background: linear-gradient(135deg, #efd696, #bd9347);
    box-shadow: 0 12px 28px rgba(0,0,0,.36);
  }

  .mobile-menu-backdrop {
    position: fixed;
    inset: 0;
    z-index: 180;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 18px 10px calc(82px + env(safe-area-inset-bottom));
    background: rgba(5,7,10,.72);
    backdrop-filter: blur(7px);
  }

  .mobile-menu-sheet {
    width: 100%;
    max-width: 540px;
    max-height: calc(100dvh - 112px - env(safe-area-inset-bottom));
    overflow-y: auto;
    border: 1px solid rgba(200,164,93,.36);
    border-radius: 24px;
    background: #fbfaf6;
    box-shadow: 0 30px 85px rgba(0,0,0,.48);
  }

  .mobile-menu-header {
    position: sticky;
    top: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px;
    border-bottom: 1px solid #e7e2d5;
    background: rgba(251,250,246,.97);
    backdrop-filter: blur(10px);
  }

  .mobile-menu-brand {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 11px;
  }

  .mobile-menu-brand img {
    width: 48px;
    height: 48px;
    flex: 0 0 auto;
    object-fit: cover;
    border-radius: 13px;
  }

  .mobile-menu-brand strong,
  .mobile-menu-brand span {
    display: block;
  }

  .mobile-menu-brand strong {
    color: #20232a;
    font-size: 15px;
  }

  .mobile-menu-brand span {
    margin-top: 4px;
    color: #747983;
    font-size: 12px;
  }

  .mobile-menu-close {
    width: 44px;
    height: 44px;
    flex: 0 0 auto;
    border: 1px solid #ddd6c7;
    border-radius: 13px;
    color: #20232a;
    background: #fff;
    font-size: 26px;
  }

  .mobile-menu-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    padding: 14px;
  }

  .mobile-menu-page {
    min-width: 0;
    min-height: 112px;
    display: grid;
    align-content: center;
    justify-items: start;
    gap: 5px;
    padding: 15px;
    border: 1px solid #e5dece;
    border-radius: 17px;
    color: #20232a;
    text-align: left;
    background: #fff;
    box-shadow: 0 8px 22px rgba(32,31,27,.06);
  }

  .mobile-menu-page > span {
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    border-radius: 10px;
    color: #76561f;
    background: #f5ead0;
    font-size: 19px;
  }

  .mobile-menu-page strong {
    font-size: 14px;
  }

  .mobile-menu-page small {
    color: #747983;
    line-height: 1.35;
    font-size: 11px;
  }

  .mobile-menu-page.active {
    border-color: #c8a45d;
    background: #fff9ea;
    box-shadow: inset 0 0 0 1px #c8a45d;
  }

  .mobile-menu-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 13px 14px calc(13px + env(safe-area-inset-bottom));
    border-top: 1px solid #e7e2d5;
    background: #f4f0e7;
  }

  .mobile-menu-footer span {
    color: #747983;
    font-size: 11px;
    font-weight: 700;
  }

  .mobile-menu-footer button {
    min-height: 44px;
    padding: 0 16px;
    border: 1px solid #e1bcbc;
    border-radius: 12px;
    color: #a52e2e;
    background: #fff5f5;
    font-weight: 900;
  }
}

@media (max-width: 390px) {
  .mobile-menu-grid {
    grid-template-columns: minmax(0, 1fr);
  }

  .mobile-menu-page {
    min-height: 86px;
    grid-template-columns: 38px minmax(0, 1fr);
    align-items: center;
  }

  .mobile-menu-page small {
    grid-column: 2;
  }

  .mobile-nav-item {
    font-size: 9px;
  }
}
</style>

<style>
/* V17 son katman: sağdan açılan mobil hamburger menü */
@media (max-width: 760px) {
  .app { padding-bottom: 0 !important; }
  .page { padding-bottom: calc(28px + env(safe-area-inset-bottom)); }
  .topbar { padding-right: 68px; }
  .topbar-badges { display: none; }
  .mobile-bottom-nav { display: none !important; }

  .mobile-hamburger-button {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 46px;
    height: 46px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 0;
    border: 1px solid rgba(167,126,52,.38);
    border-radius: 13px;
    background: linear-gradient(145deg,#fffdf7,#f1e4c4);
    box-shadow: 0 7px 18px rgba(38,31,17,.12);
  }

  .mobile-hamburger-button span {
    width: 22px;
    height: 2px;
    border-radius: 3px;
    background: #372d1c;
    transition: transform .2s ease, opacity .2s ease;
  }
  .mobile-hamburger-button.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .mobile-hamburger-button.open span:nth-child(2) { opacity: 0; }
  .mobile-hamburger-button.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .mobile-menu-backdrop {
    align-items: stretch;
    justify-content: flex-end;
    padding: 0;
  }

  .mobile-menu-sheet {
    width: min(88vw,390px);
    max-width: 390px;
    height: 100dvh;
    max-height: none;
    margin: 0;
    border-width: 0 0 0 1px;
    border-radius: 24px 0 0 24px;
    display: flex;
    flex-direction: column;
  }

  .mobile-menu-grid {
    flex: 1;
    grid-template-columns: minmax(0,1fr);
    align-content: start;
    overflow-y: auto;
    padding: 12px;
  }

  .mobile-menu-page {
    min-height: 72px;
    grid-template-columns: 42px minmax(0,1fr);
    grid-template-rows: auto auto;
    align-items: center;
    align-content: center;
    column-gap: 11px;
    row-gap: 2px;
    padding: 11px 13px;
  }
  .mobile-menu-page > span { grid-row: 1 / 3; }
  .mobile-menu-page strong,
  .mobile-menu-page small { grid-column: 2; }
  .mobile-menu-footer { flex: 0 0 auto; }
}
</style>

<style>
/* V18 son katman */
@media (max-width: 760px) {
  .mobile-menu-backdrop { justify-content: flex-start; }
  .mobile-menu-sheet {
    border-width: 0 1px 0 0;
    border-radius: 0 24px 24px 0;
    box-shadow: 28px 0 75px rgba(0,0,0,.42);
  }
  .mobile-menu-page > .menu-line-icon {
    width: 42px;
    height: 42px;
    display: grid;
    place-items: center;
    border-radius: 13px;
    color: #7b5a20;
    background: linear-gradient(145deg,#fff8e7,#ead5a2);
    box-shadow: inset 0 0 0 1px rgba(167,126,52,.2);
  }
  .menu-line-icon svg {
    width: 24px;
    height: 24px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .mobile-menu-page.active > .menu-line-icon {
    color: #fffaf0;
    background: linear-gradient(145deg,#c49a4b,#8d6728);
    box-shadow: 0 7px 15px rgba(115,81,25,.25);
  }
}
</style>
