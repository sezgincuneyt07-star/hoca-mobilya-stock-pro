<script>

/* Kamera sistemi koddan silinmedi. Tekrar açmak için false değerini true yapın. */
const CAMERA_ENABLED = true;
const APP_CAMERA_MODE = "GITHUB_TOP_LEVEL_V16_STABLE_BATCH";

(() => {
  "use strict";

  const state = {
    token: "",
    user: null,
    currentProduct: null,
    cameraStream: null,
    barcodeDetector: null,
    cameraRunning: false,
    cameraBusy: false,
    lastCameraBarcode: "",
    lastCameraScanAt: 0,
    cameraScanCount: 0,
    productSearchResults: [],
    selectedManagementProduct: null,
    productSearchTimer: null,
    lastProductSearchQuery: "",
    dailySearchTimer: null,
    dailyView: "summary",
    dailyPersonnelLoaded: false,
    bulkSelectedType: "Yatak",
    bulkProducts: [],
    bulkSearchTimer: null,
    cameraEngine: "",
    zxingReader: null,
    zxingControls: null,
    cameraTrack: null,
    torchEnabled: false,
    cameraRecent: [],
    stockCameraRunning: false,
    stockCameraEngine: "",
    stockCameraStream: null,
    stockCameraTrack: null,
    stockCameraDetector: null,
    stockCameraReader: null,
    stockCameraControls: null,
    stockCameraTorchEnabled: false,
    stockCameraBusy: false,
    githubCameraWindow: null,
    githubCameraReady: false,
    githubCameraMode: "quick",
    githubCameraQueue: [],
    githubCameraProcessing: false,
    githubCameraFrame: null,
    pendingUnknownProduct: null,
    newProductFromCamera: false,
    newProductOrigin: "products",
    personnelRecords: [],
    selectedPersonnelRecord: null,
    personnelSearchQuery: "",
    movementRecords: [],
    filteredMovementRecords: [],
    movementSearchTimer: null,
    stockSearchTimer: null,
    stockSearchRequestId: 0,
    stockSearchResults: [],
    stockSearchActiveIndex: -1,
    stockSelectedFromSuggestion: false,
    productReportRecords: [],
    filteredProductReportRecords: [],
    productReportSearchTimer: null,
    returnedCameraScan: null,
    sameTabCameraBusy: false
  };

  const pageInfo = {
    home: ["Ana Sayfa", "HOCA MOBİLYA stok yönetim sistemi"],
    stock: ["Stok İşlemi", "Stok giriş ve çıkış işlemleri"],
    camera: ["Hızlı Kamera", "Cihazda korunan liste ve güvenli son onay"],
    products: ["Ürünler", "Ürün arama ve ürün yönetimi"],
    daily: ["Günlük Kontrol", "Günlük stok hareketleri"],
    bulk: ["Toplu Stok", "Ürün gruplarına göre stok listesi"],
    reports: ["Stok Raporları", "Kategori bazlı ürün ve stok raporları"],
    movements: ["Hareketler", "Tüm personellerin stok işlem geçmişi"],
    personnel: ["Personel Yönetimi", "Personel ve yetki ayarları"]
  };

  const $ = (id) => document.getElementById(id);

  const REMEMBERED_SESSION_KEY = "hoca_stok_remembered_session";

  /*
   * Güvenlik: Personel seçimi hiçbir zaman otomatik giriş yapmaz.
   * PIN her yeni uygulama açılışında yeniden istenir.
   * Eski sürümlerin bıraktığı oturum anahtarları da temizlenir.
   */
  function saveRememberedSession() {
    clearRememberedSession();
  }

  function loadRememberedSessionToken() {
    clearRememberedSession();
    return "";
  }

  function clearRememberedSession() {
    try {
      localStorage.removeItem(REMEMBERED_SESSION_KEY);
      localStorage.removeItem("hoca_stok_token");
      sessionStorage.removeItem(REMEMBERED_SESSION_KEY);
    } catch (error) {}
  }

  function applyCameraAvailability() {
    if (CAMERA_ENABLED) return;

    const style = document.createElement("style");
    style.id = "camera-disabled-style";
    style.textContent = `
      .camera-temporarily-disabled {
        opacity: .68;
        cursor: not-allowed !important;
        filter: grayscale(.25);
      }
      .camera-disabled-notice {
        margin: 14px 0;
        padding: 14px 16px;
        border: 1px solid #f0b36a;
        border-radius: 12px;
        background: #fff7ed;
        color: #8a4b08;
        font-weight: 700;
      }
    `;
    document.head.appendChild(style);

    ["openStockCameraButton", "toggleCameraButton", "toggleTorchButton", "stockCameraTorchButton"].forEach(id => {
      const button = $(id);
      if (!button) return;
      button.classList.add("camera-temporarily-disabled");
      button.setAttribute("aria-disabled", "true");
      button.title = "Kamera özelliği geçici olarak pasif durumda.";
    });

    const stockButton = $("openStockCameraButton");
    if (stockButton) stockButton.textContent = "Canlı Kamera (Pasif)";

    const quickButton = $("toggleCameraButton");
    if (quickButton) quickButton.textContent = "Kamera Geçici Olarak Pasif";

    const cameraPage = $("page-camera");
    if (cameraPage && !$("cameraDisabledNotice")) {
      const notice = document.createElement("div");
      notice.id = "cameraDisabledNotice";
      notice.className = "camera-disabled-notice";
      notice.textContent = "Kamera özelliği geçici olarak pasif durumda. Menü ve kamera altyapısı korunmuştur.";
      cameraPage.insertBefore(notice, cameraPage.firstChild);
    }
  }

  function serverCall(functionName, ...args) {
    return new Promise((resolve, reject) => {
      const runner = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler((error) => {
          const wrapped = new Error(
            error && error.message
              ? error.message
              : "Sunucu işlemi başarısız."
          );
          wrapped.code = error && error.code ? error.code : "SERVER_ERROR";
          reject(wrapped);
        });

      runner[functionName](...args);
    });
  }

  function showToast(message, type = "") {
    const toast = $("toast");
    toast.textContent = message;
    toast.className = "toast " + type;

    window.setTimeout(() => {
      toast.classList.add("hidden");
    }, 3000);
  }

  async function loadPersonnel() {
    const select = $("personnelSelect");

    try {
      const personnelList = await serverCall("getPersonnel");

      select.innerHTML =
        '<option value="">Personel seçiniz</option>';

      (personnelList || []).forEach((record) => {
        const option = document.createElement("option");
        option.value = record.personnel;
        option.textContent =
          record.personnel + " — " + record.role;
        select.appendChild(option);
      });

      if (!personnelList || personnelList.length === 0) {
        select.innerHTML =
          '<option value="">Aktif personel bulunamadı</option>';
      }
    } catch (error) {
      select.innerHTML =
        '<option value="">Personel listesi alınamadı</option>';

      $("loginMessage").textContent = error.message;
    }
  }

  async function login() {
    const personnel = $("personnelSelect").value;
    const pin = $("pinInput").value.trim();
    const button = $("loginButton");

    $("loginMessage").textContent = "";

    if (!personnel) {
      $("loginMessage").textContent =
        "Lütfen personel seçiniz.";
      return;
    }

    if (!pin) {
      $("loginMessage").textContent =
        "Lütfen PIN giriniz.";
      return;
    }

    button.disabled = true;
    button.textContent = "Giriş yapılıyor...";

    try {
      const result = await serverCall(
        "loginPersonnel",
        personnel,
        pin
      );

      if (!result || !result.success || !result.token) {
        throw new Error(
          result && result.message
            ? result.message
            : "Giriş yapılamadı."
        );
      }

      state.token = result.token;

      state.user = {
        personnel: result.personnel,
        role: result.role,
        isAdmin: Boolean(result.isAdmin)
      };

      /* PIN saklanmaz; yalnızca 6 saatlik oturum anahtarı tutulur. */
      saveRememberedSession(result.token, result.expiresIn);
      showApplication();
      showToast("Giriş başarılı.", "success");
      await processReturnedCameraScan();
    } catch (error) {
      $("loginMessage").textContent = error.message;
    } finally {
      button.disabled = false;
      button.textContent = "Giriş Yap";
    }
  }

  async function restoreSession() {
    if (!state.token) {
      showLogin();
      return;
    }

    try {
      const result = await serverCall(
        "getSessionUser",
        state.token
      );

      state.user = {
        personnel: result.personnel,
        role: result.role,
        isAdmin: Boolean(result.isAdmin)
      };

      showApplication();
    } catch (error) {
      clearRememberedSession();
      state.token = "";
      state.user = null;
      showLogin();
    }
  }

  function showLogin() {
    closeMobileMenu();
    $("loginScreen").classList.remove("hidden");
    $("appScreen").classList.add("hidden");

    if ($("personnelSelect")) {
      $("personnelSelect").value = "";
    }

    if ($("pinInput")) {
      $("pinInput").value = "";
    }

    if ($("loginMessage")) {
      $("loginMessage").textContent = "";
    }
  }

  function showApplication() {
    $("loginScreen").classList.add("hidden");
    $("appScreen").classList.remove("hidden");

    $("currentUser").textContent = state.user.personnel;
    $("currentRole").textContent = state.user.role;
    $("welcomeUser").textContent = state.user.personnel;
    if ($("mobileMenuUser")) {
      $("mobileMenuUser").textContent = state.user.personnel + " • " + state.user.role;
    }

    document
      .querySelectorAll(".admin-only")
      .forEach((element) => {
        element.classList.toggle(
          "hidden",
          !state.user.isAdmin
        );
      });

    openPage("home");
  }

  async function logout() {
    try {
      if (state.token) {
        await serverCall(
          "logoutSession",
          state.token
        );
      }
    } catch (error) {
      // Oturum zaten düşmüş olabilir.
    }

    stopCameraScanner();

    sendCameraReply({
      source: "HOCA_MOBILYA_APP",
      type: "SESSION_CLOSED"
    });
    state.githubCameraWindow = null;
    state.githubCameraFrame = null;
    state.githubCameraReady = false;
    state.githubCameraQueue = [];
    state.pendingUnknownProduct = null;

    clearRememberedSession();

    state.token = "";
    state.user = null;

    $("pinInput").value = "";

    showLogin();
    showToast("Oturum kapatıldı.");
  }

  const GITHUB_CAMERA_URL =
    "https://sezgincuneyt07-star.github.io/hoca-mobilya-stock-pro/";

  const APPS_SCRIPT_URL =
    "https://script.google.com/macros/s/AKfycbzKW87lp7ZpwzvrJr0W36rj_VCScP2MCZJBOdUnU4NX_i2K0fJeUUsjzZapnsT1kjrc/exec";

  const GITHUB_CAMERA_ORIGIN =
    "https://sezgincuneyt07-star.github.io";

  function setHybridConnection(title, text, status = "waiting") {
    const box = $("hybridCameraConnection");
    if (!box) return;
    $("hybridConnectionTitle").textContent = title;
    $("hybridConnectionText").textContent = text;
    box.className = "hybrid-connection " + status;
  }

  function isRunningInsideGithubApp() {
    try {
      return window.top !== window;
    } catch (error) {
      return true;
    }
  }

  function getGithubCameraTarget() {
    if (state.githubCameraWindow) {
      return state.githubCameraWindow;
    }

    if (isRunningInsideGithubApp()) {
      return window.top;
    }

    return null;
  }

  function openGithubCamera(mode = "quick") {
    if (!CAMERA_ENABLED) {
      showToast("Kamera özelliği geçici olarak pasif durumda.", "error");
      return;
    }

    if (!state.token) {
      showToast("Önce personel girişi yapın.", "error");
      return;
    }

    const cameraMode = mode === "stock" ? "stock" : "quick";
    state.githubCameraMode = cameraMode;
    state.githubCameraReady = false;
    sessionStorage.setItem("hoca_camera_mode", cameraMode);
    saveRememberedSession(state.token, 21600);

    if (isRunningInsideGithubApp()) {
      window.top.postMessage(
        {
          source: "HOCA_MOBILYA_APP",
          type: "OPEN_CAMERA",
          mode: cameraMode,
          personnel: state.user ? state.user.personnel : ""
        },
        GITHUB_CAMERA_ORIGIN
      );

      setHybridConnection(
        "Kamera uygulama içinde açılıyor",
        cameraMode === "quick"
          ? "Barkodlar listeye eklenecek; stok son onaydan sonra değişecek."
          : "Okunan barkod stok işlem ekranına aktarılacak.",
        "waiting"
      );

      if ($("toggleCameraButton")) {
        $("toggleCameraButton").textContent = "Kamera Açılıyor...";
        $("toggleCameraButton").classList.add("active");
      }
      return;
    }

    showToast(
      "Uygulama içi kamera için sistemi GitHub bağlantısından açın.",
      "error"
    );
    setHybridConnection(
      "GitHub uygulaması gerekli",
      "Kamerayı aynı ekranda kullanmak için hoca-mobilya-stock-pro bağlantısını açın.",
      "error"
    );
  }

  function closeGithubCamera() {
    const target = getGithubCameraTarget();

    if (target) {
      try {
        target.postMessage(
          { source: "HOCA_MOBILYA_APP", type: "CLOSE_CAMERA" },
          GITHUB_CAMERA_ORIGIN
        );
      } catch (error) {}
    }

    state.githubCameraReady = false;
    state.githubCameraWindow = null;

    if ($("toggleCameraButton")) {
      $("toggleCameraButton").textContent = "Canlı Kamerayı Başlat";
      $("toggleCameraButton").classList.remove("active");
    }
  }

  function sendCameraReply(payload) {
    const target = getGithubCameraTarget();
    if (!target) return;

    try {
      target.postMessage(payload, GITHUB_CAMERA_ORIGIN);
    } catch (error) {}
  }

  function enqueueGithubBarcode(barcode, scanId) {
    const cleanBarcode = String(barcode || "").trim();
    if (!cleanBarcode) return;

    state.githubCameraQueue.push({
      barcode: cleanBarcode,
      scanId: String(scanId || "")
    });

    processGithubCameraQueue();
  }

  async function processGithubCameraQueue() {
    if (state.githubCameraProcessing || state.pendingUnknownProduct || !state.githubCameraQueue.length) return;

    state.githubCameraProcessing = true;
    const item = state.githubCameraQueue.shift();
    const barcode = item.barcode;

    $("cameraLastBarcode").textContent = barcode;
    $("cameraLastResult").textContent = "Ürün kontrol ediliyor...";
    setCameraMessage(barcode + " kontrol ediliyor...");

    try {
      const product = await serverCall(
        "getProduct",
        barcode,
        state.token
      );

      if (!product) {
        const notFoundError = new Error("Bu barkoda ait ürün bulunamadı.");
        notFoundError.code = "PRODUCT_NOT_FOUND";
        throw notFoundError;
      }

      if (String(product.active || "").toLocaleLowerCase("tr-TR") !== "evet") {
        const passiveError = new Error("Bu ürün pasif durumdadır.");
        passiveError.code = "PRODUCT_PASSIVE";
        throw passiveError;
      }

      state.cameraScanCount += 1;
      $("cameraScanCount").textContent = String(state.cameraScanCount);
      $("cameraLastResult").textContent =
        "Onay listesine eklendi • Mevcut stok: " + product.stock;

      setCameraMessage(
        "Ürün onay listesine eklendi. Stok henüz değişmedi.",
        "success"
      );
      setHybridConnection(
        "Kamera bağlı ve hazır",
        "Barkodlar geçici listeye ekleniyor. Stok son onaydan sonra değişecek.",
        "connected"
      );

      state.cameraRecent.unshift({
        barcode,
        newStock: product.stock,
        message: (product.model || "Ürün") + " • Onay bekliyor",
        time: new Date().toLocaleTimeString("tr-TR", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        })
      });
      renderCameraRecent();

      sendCameraReply({
        source: "HOCA_MOBILYA_APP",
        type: "CAMERA_ITEM_RESULT",
        scanId: item.scanId,
        success: true,
        barcode,
        product,
        message: "Ürün onay listesine eklendi."
      });
    } catch (error) {
      $("cameraLastResult").textContent = "Hata: " + error.message;
      setCameraMessage(error.message, "error");
      playCameraBeep(false);

      if (error.code === "PRODUCT_NOT_FOUND") {
        state.pendingUnknownProduct = {
          barcode,
          scanId: item.scanId
        };
        openUnknownProductModal(barcode);
        setHybridConnection(
          "Ürün kaydı bekleniyor",
          "Barkod kayıtlı değil. Ürünü ekleyin veya taramaya devam edin.",
          "error"
        );
        sendCameraReply({
          source: "HOCA_MOBILYA_APP",
          type: "PRODUCT_REQUIRED",
          scanId: item.scanId,
          barcode,
          message: error.message
        });
      } else {
        sendCameraReply({
          source: "HOCA_MOBILYA_APP",
          type: "CAMERA_ITEM_RESULT",
          scanId: item.scanId,
          success: false,
          barcode,
          code: error.code || "PRODUCT_ERROR",
          message: error.message
        });
      }
    } finally {
      state.githubCameraProcessing = false;
      if (!state.pendingUnknownProduct) {
        window.setTimeout(processGithubCameraQueue, 80);
      }
    }
  }

  function captureReturnedCameraScan() {
    const params = new URLSearchParams(window.location.search);
    const privateParams = new URLSearchParams(
      String(window.location.hash || "").replace(/^#/, "")
    );

    const barcode = String(params.get("cameraBarcode") || "").trim();
    const mode = params.get("cameraMode") === "stock" ? "stock" : "quick";
    const cancelled = params.get("cameraCancelled") === "1";
    const cameraToken = String(privateParams.get("cameraToken") || "").trim();

    if (cameraToken) {
      state.token = cameraToken;
      saveRememberedSession(cameraToken, 21600);
    }

    if (barcode) {
      state.returnedCameraScan = { barcode, mode };
    } else if (cancelled) {
      sessionStorage.removeItem("hoca_camera_mode");
    }

    if (barcode || cancelled || cameraToken) {
      try {
        window.history.replaceState(
          {},
          document.title,
          window.location.pathname
        );
      } catch (error) {}
    }
  }

  async function processReturnedCameraScan() {
    if (!state.token || !state.returnedCameraScan || state.sameTabCameraBusy) return;

    const scan = state.returnedCameraScan;
    state.returnedCameraScan = null;
    state.sameTabCameraBusy = true;

    try {
      if (scan.mode === "stock") {
        openPage("stock");
        await useScannedStockBarcode(scan.barcode);
        showToast("Barkod stok işlem ekranına aktarıldı.", "success");
        return;
      }

      openPage("camera");

      if (!isRunningInsideGithubApp()) {
        throw new Error(
          "V16 hızlı kamera yalnızca GitHub uygulaması içinde çalışır. Doğrudan stok artırma güvenlik nedeniyle kapatıldı."
        );
      }

      const product = await serverCall(
        "getProduct",
        scan.barcode,
        state.token
      );

      if (!product) {
        state.pendingUnknownProduct = {
          barcode: scan.barcode,
          scanId: "returned-" + Date.now()
        };
        openUnknownProductModal(scan.barcode);
        return;
      }

      sendCameraReply({
        source: "HOCA_MOBILYA_APP",
        type: "ADD_PRODUCT_TO_BATCH",
        product: product,
        quantity: 1
      });

      setCameraMessage(
        "Ürün güvenli onay listesine eklendi. Stok henüz değişmedi.",
        "success"
      );
      showToast("Ürün hızlı kamera listesine eklendi.", "success");
    } catch (error) {
      setCameraMessage(error.message, "error");
      showToast(error.message, "error");
    } finally {
      state.sameTabCameraBusy = false;
      sessionStorage.removeItem("hoca_camera_mode");
    }
  }

  async function handleGithubCameraMessage(event) {
    if (!CAMERA_ENABLED) return;
    if (event.origin !== GITHUB_CAMERA_ORIGIN) return;

    const data = event.data || {};
    if (data.source !== "HOCA_MOBILYA_CAMERA") return;

    if (data.type === "CAMERA_READY") {
      state.githubCameraWindow = event.source;
      state.githubCameraFrame = $("githubCameraFrame");
      state.githubCameraReady = true;
      if ($("toggleCameraButton")) {
        $("toggleCameraButton").textContent = "Kamerayı Kapat";
        $("toggleCameraButton").classList.add("active");
      }
      setHybridConnection(
        "Kamera bağlı ve hazır",
        "Barkodlar listeye eklenir; stok yalnızca son onaydan sonra değişir.",
        "connected"
      );
      sendCameraReply({
        source: "HOCA_MOBILYA_APP",
        type: "APP_READY",
        personnel: state.user ? state.user.personnel : ""
      });
      return;
    }

    if (data.type === "BARCODE_SCANNED") {
      const barcode = String(data.barcode || "").trim();
      if (!barcode) return;
      if (state.githubCameraMode === "stock") {
        sendCameraReply({ source: "HOCA_MOBILYA_APP", type: "SCAN_ACCEPTED", scanId: data.scanId, barcode });
        await useScannedStockBarcode(barcode);
        closeGithubCamera();
      } else {
        enqueueGithubBarcode(barcode, data.scanId);
      }
      return;
    }

    if (data.type === "CONFIRM_CAMERA_BATCH") {
      try {
        const result = await serverCall(
          "batchQuickStockIn",
          Array.isArray(data.items) ? data.items : [],
          String(data.requestId || ""),
          state.token
        );

        sendCameraReply(Object.assign(
          {
            source: "HOCA_MOBILYA_APP",
            type: "BATCH_STOCK_RESULT"
          },
          result || {
            success: false,
            message: "Toplu stok işlemi tamamlanamadı."
          }
        ));

        if (result && result.success) {
          state.cameraRecent = [];
          state.cameraScanCount = 0;
          $("cameraScanCount").textContent = "0";
          renderCameraRecent();
          $("cameraLastResult").textContent = result.message;
          setCameraMessage(result.message, "success");
          setHybridConnection(
            "Toplu stok girişi tamamlandı",
            "Yeni bir liste oluşturmak için barkod okutmaya devam edebilirsiniz.",
            "connected"
          );
          await loadDashboard(false);
        }
      } catch (error) {
        sendCameraReply({
          source: "HOCA_MOBILYA_APP",
          type: "BATCH_STOCK_RESULT",
          success: false,
          code: error.code || "BATCH_ERROR",
          message: error.message || "Toplu stok işlemi tamamlanamadı."
        });
      }
      return;
    }

    if (data.type === "ADD_UNKNOWN_PRODUCT") {
      if (state.pendingUnknownProduct) {
        addUnknownProduct();
      }
      return;
    }

    if (data.type === "SKIP_UNKNOWN_PRODUCT") {
      if (state.pendingUnknownProduct) {
        continueAfterUnknownProduct();
      }
      return;
    }

    if (data.type === "CAMERA_CLOSED") {
      closeGithubCamera();
      state.githubCameraReady = false;
      setHybridConnection(
        "Kamera kapatıldı",
        "Onay bekleyen liste GitHub kamera ekranında korunur.",
        "waiting"
      );
    }
  }

  function setMobileMenuOpen(isOpen) {
    const backdrop = $("mobileMenuBackdrop");
    if (!backdrop) return;
    backdrop.classList.toggle("hidden", !isOpen);
    backdrop.setAttribute("aria-hidden", isOpen ? "false" : "true");
    document.body.classList.toggle("mobile-menu-open", Boolean(isOpen));
    if ($("mobileMenuButton")) {
      $("mobileMenuButton").setAttribute("aria-expanded", isOpen ? "true" : "false");
      $("mobileMenuButton").classList.toggle("open", Boolean(isOpen));
    }
  }

  function closeMobileMenu() {
    setMobileMenuOpen(false);
  }

  function openPage(pageName) {
    if (
      pageName !== "camera" &&
      state.cameraRunning
    ) {
      stopCameraScanner();
    }

    if (
      ["personnel", "movements"].includes(pageName) &&
      !state.user.isAdmin
    ) {
      return;
    }

  function getBulkStatus(product) {
    const stock = Number(product.stock || 0);
    const critical = Number(product.critical || 0);

    if (stock === 0) {
      return {
        text: "Stok Yok",
        className: "zero"
      };
    }

    if (stock <= critical) {
      return {
        text: "Kritik",
        className: "critical"
      };
    }

    return {
      text: "Normal",
      className: ""
    };
  }

  function getFilteredBulkProducts() {
    const search =
      $("bulkSearchInput").value.trim().toLocaleLowerCase("tr-TR");

    const stockFilter = $("bulkStockFilter").value;

    return state.bulkProducts.filter(product => {
      const stock = Number(product.stock || 0);
      const critical = Number(product.critical || 0);

      const text = [
        product.model,
        product.code,
        product.size,
        product.color,
        product.barcode
      ].join(" ").toLocaleLowerCase("tr-TR");

      const matchesSearch =
        !search || text.includes(search);

      let matchesStock = true;

      if (stockFilter === "critical") {
        matchesStock = stock > 0 && stock <= critical;
      } else if (stockFilter === "zero") {
        matchesStock = stock === 0;
      } else if (stockFilter === "available") {
        matchesStock = stock > 0;
      }

      return matchesSearch && matchesStock;
    });
  }

    if (!state.token) return;

    window.clearTimeout(state.dailySearchTimer);

    const filters = {
      date: $("dailyDateInput").value || getLocalDateKey(),
      personnel:
        state.user && state.user.isAdmin
          ? $("dailyPersonnelSelect").value
          : "",
      type: $("dailyTypeSelect").value,

    };

    $("dailyLoading").classList.remove("hidden");
    $("dailyEmpty").classList.add("hidden");
    $("dailySummaryView").classList.add("hidden");
    $("dailyDetailsView").classList.add("hidden");
    $("refreshDailyButton").disabled = true;
    setDailyMessage("");

    try {
      const result = await serverCall(
        "getDailyStockEntries",
        filters,
        state.token
      );

      if (!result || !result.success) {
        throw new Error("Günlük kayıtlar alınamadı.");
      }

      renderDailySummary(result.summary || []);
      renderDailyDetails(result.details || []);
      updateDailySummaryCards(result);

      const hasRows =
        Array.isArray(result.details) &&
        result.details.length > 0;

      $("dailyEmpty").classList.toggle("hidden", hasRows);

      if (hasRows) {
        setDailyView(state.dailyView);

        showToast("Günlük kayıtlar yenilendi.", "success");

      $("dailyEmpty").classList.remove("hidden");
      $("dailyEmpty").innerHTML =
        "<strong>Veriler alınamadı</strong><span>" +
        error.message +
        "</span>";
      setDailyMessage(error.message, "error");

      $("dailyLoading").classList.add("hidden");
      $("refreshDailyButton").disabled = false;
    }

      $("productResultCount").textContent = "0 ürün";

    $("productsSearchEmpty").classList.add("hidden");

      state.newProductFromCamera &&
      Boolean(state.pendingUnknownProduct);

    $("newProductModal").classList.add("hidden");
    $("newProductModal").setAttribute("aria-hidden", "true");
    $("newProductBarcode").readOnly = false;
    state.newProductFromCamera = false;
    state.newProductOrigin = "products";

      continueAfterUnknownProduct();

  async function saveNewProduct(event) {
    event.preventDefault();

    const productData = {
      barcode: $("newProductBarcode").value.trim(),
      code: $("newProductCode").value.trim(),
      type: $("newProductType").value,
      model: $("newProductModel").value.trim(),
      size: $("newProductSize").value.trim(),
      color: $("newProductColor").value.trim(),
      stock: Number($("newProductStock").value || 0),
      critical: Number($("newProductCritical").value || 0),
      active: $("newProductActive").value
    };

    $("saveNewProductButton").disabled = true;
    $("saveNewProductButton").textContent = "Kaydediliyor...";
    setNewProductMessage("");

    try {
      const result = await serverCall("addProduct", productData, state.token);

      if (!result || !result.success) {
        throw new Error(result && result.message ? result.message : "Ürün kaydedilemedi.");
      }

      setNewProductMessage(result.message, "success");
      $("productSearchInput").value = result.product.barcode;

      const productOrigin = state.newProductOrigin;

      if (state.newProductFromCamera && state.pendingUnknownProduct) {
        const pending = state.pendingUnknownProduct;
        const addedProduct = result.product;

        state.pendingUnknownProduct = null;
        state.newProductFromCamera = false;
        state.newProductOrigin = "products";
        $("newProductModal").classList.add("hidden");
        $("newProductModal").setAttribute("aria-hidden", "true");
        $("newProductBarcode").readOnly = false;
        setNewProductMessage("");

        $("cameraLastBarcode").textContent = pending.barcode;
        $("cameraLastResult").textContent = "Yeni ürün onay listesine eklendi";

        state.cameraRecent.unshift({
          barcode: pending.barcode,
          newStock: addedProduct.stock,
          message: (addedProduct.model || "Yeni ürün") + " • Onay bekliyor",
          time: new Date().toLocaleTimeString("tr-TR", {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          })
        });
        renderCameraRecent();

        sendCameraReply({
          source: "HOCA_MOBILYA_APP",
          type: "PRODUCT_ADDED_TO_BATCH",
          scanId: pending.scanId,
          barcode: pending.barcode,
          product: addedProduct,
          message: "Yeni ürün kaydedildi ve onay listesine eklendi."
        });

        setCameraMessage(
          "Yeni ürün kaydedildi ve onay listesine eklendi. Stok henüz değişmedi.",
          "success"
        );
        setHybridConnection(
          "Kamera yeniden açılıyor",
          "Yeni ürün onay listesine eklendi. Sıradaki barkodu okutabilirsiniz.",
          "connected"
        );
        await loadDashboard(false);
      } else if (productOrigin === "stock") {
        state.newProductOrigin = "products";
        $("newProductModal").classList.add("hidden");
        $("newProductModal").setAttribute("aria-hidden", "true");
        $("newProductBarcode").readOnly = false;
        setNewProductMessage("");

        $("stockBarcode").value = result.product.barcode || productData.barcode;
        hideStockNotFoundActions();
        hideStockProductSuggestions();
        showProductPreview(result.product);
        $("stockQuantity").value = "1";
        setStockMessage(
          "Yeni ürün kaydedildi. İşlem türünü ve adedi kontrol ederek stok işlemini kaydedebilirsiniz.",
          "success"
        );
        showToast("Yeni ürün stok işlemine hazırlandı.", "success");
        await loadDashboard(false);
        window.setTimeout(() => $("stockQuantity").focus(), 80);
      } else {
        window.setTimeout(async () => {
          closeNewProductModal();
          await searchProducts();
          await loadDashboard(false);
        }, 650);
      }
    } catch (error) {
      setNewProductMessage(error.message, "error");
    } finally {
      $("saveNewProductButton").disabled = false;
      $("saveNewProductButton").textContent = "Ürünü Kaydet";
    }
  }

  function hideStockProductSuggestions() {
    const panel = $("stockProductSuggestions");
    if (!panel) return;
    panel.classList.add("hidden");
    panel.innerHTML = "";
    state.stockSearchResults = [];
    state.stockSearchActiveIndex = -1;
    $("stockBarcode").setAttribute("aria-expanded", "false");
  }

  function setActiveStockSuggestion(index) {
    const panel = $("stockProductSuggestions");
    const items = panel ? Array.from(panel.querySelectorAll(".stock-product-suggestion")) : [];
    if (!items.length) return;

    const nextIndex = Math.max(0, Math.min(index, items.length - 1));
    state.stockSearchActiveIndex = nextIndex;
    items.forEach((item, itemIndex) => {
      const active = itemIndex === nextIndex;
      item.classList.toggle("active", active);
      item.setAttribute("aria-selected", active ? "true" : "false");
    });
    items[nextIndex].scrollIntoView({ block: "nearest" });
  }

  function selectStockSearchProduct(product) {
    if (!product) return;
    state.stockSelectedFromSuggestion = true;
    $("stockBarcode").value = product.barcode || "";
    hideStockProductSuggestions();
    hideStockNotFoundActions();
    showProductPreview(product);
    setStockMessage("Ürün seçildi. İşlem adedini belirleyip kaydedebilirsiniz.", "success");
    $("stockQuantity").focus();
    $("stockQuantity").select();
  }

  function renderStockProductSuggestions(products, query) {
    const panel = $("stockProductSuggestions");
    if (!panel) return;

    const items = Array.isArray(products) ? products : [];
    state.stockSearchResults = items;
    state.stockSearchActiveIndex = -1;
    panel.innerHTML = "";
    panel.classList.remove("hidden");
    $("stockBarcode").setAttribute("aria-expanded", "true");

    if (!items.length) {
      const empty = document.createElement("div");
      empty.className = "stock-suggestion-state";
      empty.innerHTML = "<strong>Ürün bulunamadı</strong><span>“" + escapeHtml(query) + "” için eşleşme yok.</span>";
      panel.appendChild(empty);
      return;
    }

    items.forEach((product, index) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "stock-product-suggestion";
      button.setAttribute("role", "option");
      button.setAttribute("aria-selected", "false");

      const main = document.createElement("div");
      main.className = "stock-suggestion-main";

      const name = document.createElement("strong");
      name.textContent = product.model || product.code || "Ürün";

      const detail = document.createElement("span");
      detail.textContent = [
        product.type,
        product.size && "Ölçü: " + product.size,
        product.color && "Renk: " + product.color,
        product.code && "Kod: " + product.code
      ].filter(Boolean).join(" • ");

      const barcode = document.createElement("small");
      barcode.textContent = "Barkod: " + (product.barcode || "-");

      const stock = document.createElement("div");
      stock.className = "stock-suggestion-stock";
      stock.innerHTML = "<strong>" + Number(product.stock || 0) + "</strong><span>STOK</span>";

      main.appendChild(name);
      main.appendChild(detail);
      main.appendChild(barcode);
      button.appendChild(main);
      button.appendChild(stock);

      button.addEventListener("mouseenter", () => setActiveStockSuggestion(index));
      button.addEventListener("mousedown", event => event.preventDefault());
      button.addEventListener("click", () => selectStockSearchProduct(product));
      panel.appendChild(button);
    });
  }

  async function searchStockProducts() {
    const query = $("stockBarcode").value.trim();
    state.stockSelectedFromSuggestion = false;

    if (query.length < 2) {
      hideStockProductSuggestions();
      return;
    }

    const requestId = ++state.stockSearchRequestId;
    const panel = $("stockProductSuggestions");
    panel.innerHTML = '<div class="stock-suggestion-state loading"><strong>Aranıyor...</strong><span>Ürünler kontrol ediliyor.</span></div>';
    panel.classList.remove("hidden");
    $("stockBarcode").setAttribute("aria-expanded", "true");

    try {
      const products = await serverCall("searchProduct", query, state.token);
      if (requestId !== state.stockSearchRequestId) return;
      renderStockProductSuggestions(products, query);
    } catch (error) {
      if (requestId !== state.stockSearchRequestId) return;
      panel.innerHTML = '<div class="stock-suggestion-state error"><strong>Arama yapılamadı</strong><span>' + escapeHtml(error.message) + '</span></div>';
      panel.classList.remove("hidden");
    }
  }

  function getStockBarcode() {
    return $("stockBarcode").value.trim();
  }

  function getStockQuantity() {
    const quantity = Number(
      $("stockQuantity").value
    );

    if (
      !Number.isInteger(quantity) ||
      quantity < 1
    ) {
      throw new Error(
        "İşlem adedi en az 1 olmalıdır."
      );
    }

    return quantity;
  }

  async function findStockProduct(showSuccessMessage = true) {
    const barcode = getStockBarcode();

    setStockMessage("");
    hideStockNotFoundActions();

    if (!barcode) {
      clearProductPreview();
      hideStockProductSuggestions();
      setStockMessage(
        "Barkod veya ürün bilgisi giriniz.",
        "error"
      );
      $("stockBarcode").focus();
      return null;
    }

    setStockButtonsDisabled(true);

    try {
      let product = await serverCall(
        "getProduct",
        barcode,
        state.token
      );

      if (!product) {
        const matches = await serverCall("searchProduct", barcode, state.token);
        if (Array.isArray(matches) && matches.length === 1) {
          product = matches[0];
          $("stockBarcode").value = product.barcode || "";
        } else if (Array.isArray(matches) && matches.length > 1) {
          renderStockProductSuggestions(matches, barcode);
          clearProductPreview();
          setStockMessage("Birden fazla ürün bulundu. Lütfen listeden seçim yapın.", "error");
          return null;
        }
      }

      if (!product) {
        clearProductPreview();
        hideStockProductSuggestions();
        showStockNotFoundActions(barcode);
        setStockMessage(
          "Bu barkod kayıtlı değil. Yeni ürün ekleyebilir veya barkodu tekrar kontrol edebilirsiniz.",
          "error"
        );
        return null;
      }

      hideStockProductSuggestions();
      hideStockNotFoundActions();

      showProductPreview(product);

      if (showSuccessMessage) {
        setStockMessage(
          "Ürün bulundu.",
          "success"
        );
      }

      return product;
    } catch (error) {
      clearProductPreview();
      setStockMessage(
        error.message,
        "error"
      );
      return null;
    } finally {
      setStockButtonsDisabled(false);
    }
  }

  async function saveStockOperation() {
    const barcode = getStockBarcode();

    if (!barcode) {
      setStockMessage(
        "Lütfen barkod giriniz.",
        "error"
      );
      $("stockBarcode").focus();
      return;
    }

    let quantity;

    try {
      quantity = getStockQuantity();
    } catch (error) {
      setStockMessage(
        error.message,
        "error"
      );
      return;
    }

    if (
      !state.currentProduct ||
      state.currentProduct.barcode !== barcode
    ) {
      const product = await findStockProduct(false);

      if (!product) {
        return;
      }
    }

    const operation =
      document.querySelector(
        'input[name="stockOperation"]:checked'
      ).value;

    const functionName =
      operation === "out"
        ? "stockOut"
        : "stockIn";

    setStockButtonsDisabled(true);
    setStockMessage("İşlem kaydediliyor...");

    try {
      const result = await serverCall(
        functionName,
        barcode,
        quantity,
        state.token
      );

      if (!result || !result.success) {
        throw new Error(
          result && result.message
            ? result.message
            : "Stok işlemi tamamlanamadı."
        );
      }

      showProductPreview(result.product);

      setStockMessage(
        result.message +
        " Yeni stok: " +
        result.newStock,
        "success"
      );

      showToast(
        result.message,
        "success"
      );

      $("stockQuantity").value = "1";
      $("stockBarcode").focus();
      $("stockBarcode").select();
    } catch (error) {
      setStockMessage(
        error.message,
        "error"
      );

      showToast(
        error.message,
        "error"
      );
    } finally {
      setStockButtonsDisabled(false);
    }
  }

  async function quickStockIn(
    barcodeOverride = "",
    fromCamera = false
  ) {
    const barcode =
      String(barcodeOverride || getStockBarcode()).trim();

    if (!barcode) {
      setStockMessage("Listeye eklemek için barkod giriniz.", "error");
      $("stockBarcode").focus();
      return null;
    }

    if (!isRunningInsideGithubApp()) {
      const message =
        "Güvenli hızlı liste için uygulamayı GitHub bağlantısından açın. Doğrudan +1 stok girişi V16 sürümünde kapatılmıştır.";
      setStockMessage(message, "error");
      showToast(message, "error");
      return null;
    }

    setStockButtonsDisabled(true);
    setStockMessage("Ürün güvenli onay listesine ekleniyor...");

    try {
      let product = state.currentProduct;

      if (!product || String(product.barcode || "") !== barcode) {
        product = await serverCall(
          "getProduct",
          barcode,
          state.token
        );
      }

      if (!product) {
        const error = new Error("Bu barkoda ait ürün bulunamadı.");
        error.code = "PRODUCT_NOT_FOUND";
        throw error;
      }

      sendCameraReply({
        source: "HOCA_MOBILYA_APP",
        type: "ADD_PRODUCT_TO_BATCH",
        product: product,
        quantity: 1
      });

      showProductPreview(product);
      setStockMessage(
        "Ürün hızlı kamera onay listesine eklendi. Stok henüz değişmedi.",
        "success"
      );
      showToast("Ürün onay listesine eklendi.", "success");

      return {
        success: true,
        product: product,
        pendingApproval: true
      };

      if (error && error.code === "PRODUCT_NOT_FOUND") {
        showStockNotFoundActions(barcode);
      }

      showToast(error.message, "error");

    } finally {
      setStockButtonsDisabled(false);
    }
  }


  async function decodeBarcodeFromImageFile(file) {
    if (!file) throw new Error("Kamera görüntüsü seçilmedi.");

    // Önce tarayıcının yerleşik barkod okuyucusunu dene.
    if ("BarcodeDetector" in window && window.createImageBitmap) {
      let bitmap = null;
      try {
        bitmap = await createImageBitmap(file);
        const formats = ["ean_13", "ean_8", "code_128", "code_39", "upc_a", "upc_e", "itf"];
        const detector = new BarcodeDetector({ formats });
        const results = await detector.detect(bitmap);
        if (results && results.length && results[0].rawValue) {
          return String(results[0].rawValue).trim();
        }
      } catch (error) {
        // Yerleşik okuyucu başarısızsa ZXing ile devam et.
      } finally {
        if (bitmap && bitmap.close) bitmap.close();
      }
    }

    if (!window.ZXingBrowser || !window.ZXingBrowser.BrowserMultiFormatReader) {
      throw new Error("Barkod okuyucu yüklenemedi. İnternet bağlantısını kontrol edin.");
    }

    const imageUrl = URL.createObjectURL(file);
    const reader = new window.ZXingBrowser.BrowserMultiFormatReader();
    try {
      const result = await reader.decodeFromImageUrl(imageUrl);
      const text = result && result.getText ? result.getText() : "";
      if (!text) throw new Error("Barkod bulunamadı.");
      return String(text).trim();
    } catch (error) {
      throw new Error("Barkod okunamadı. Barkodu kadraja tam alın, ışığı artırın ve daha yakından tekrar çekin.");
    } finally {
      URL.revokeObjectURL(imageUrl);
      try { reader.reset(); } catch (error) {}
    }
  }

    input.value = "";
    input.click();

  async function handleStockCameraCapture(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;

    const button = $("openStockCameraButton");
    button.disabled = true;
    button.textContent = "Barkod okunuyor...";

      setStockMessage(error.message, "error");
      playCameraBeep(false);

      button.disabled = false;
      button.textContent = "Kamerayla Tara";
      event.target.value = "";
    }

  function playCameraBeep(success = true) {
    try {
      const AudioContextClass =
        window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      const context = new AudioContextClass();
      const oscillator = context.createOscillator();
      const gain = context.createGain();

      oscillator.frequency.value = success ? 880 : 230;
      gain.gain.value = 0.05;

      oscillator.connect(gain);
      gain.connect(context.destination);
      oscillator.start();
      oscillator.stop(context.currentTime + (success ? 0.09 : 0.18));
      oscillator.addEventListener("ended", () => context.close());
    } catch (error) {
      // Ses desteklenmezse işlem sessiz devam eder.
    }
  }

  async function loadCameraDevices() {
    const select = $("cameraDeviceSelect");
    if (!select || !navigator.mediaDevices) return;

    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cameras = devices.filter(device => device.kind === "videoinput");
      const currentValue = select.value;

      select.innerHTML =
        '<option value="">Arka kamera (otomatik)</option>';

      cameras.forEach((camera, index) => {
        const option = document.createElement("option");
        option.value = camera.deviceId;
        option.textContent =
          camera.label || "Kamera " + (index + 1);
        select.appendChild(option);
      });

      if (
        currentValue &&
        cameras.some(camera => camera.deviceId === currentValue)
      ) {
        select.value = currentValue;
      }
    } catch (error) {
      // Kamera listesi alınamazsa otomatik seçim kullanılmaya devam eder.
    }
  }

    state.lastCameraBarcode = "";
    state.lastCameraScanAt = 0;
    state.cameraScanCount = 0;
    state.cameraRecent = [];

    $("cameraLastResult").textContent = "Barkod bekleniyor";

  function renderCameraRecent() {

  async function processCameraBarcode(barcode, source = "Kamera") {
    barcode = String(barcode || "").trim();
    if (!barcode || state.cameraBusy) return;

    const now = Date.now();
    const cooldown = Number($("cameraCooldownSelect").value || 1100);
    const sameBarcodeTooSoon =
      barcode === state.lastCameraBarcode &&
      now - state.lastCameraScanAt < cooldown;

    if (sameBarcodeTooSoon) return;

    state.cameraBusy = true;
    state.lastCameraBarcode = barcode;
    state.lastCameraScanAt = now;

    $("cameraLastBarcode").textContent = barcode;
    $("cameraLastResult").textContent = "Ürün kontrol ediliyor...";
    setCameraStatus(barcode + " kontrol ediliyor...");

    try {
      if (!isRunningInsideGithubApp()) {
        throw new Error(
          "Güvenli hızlı kamera için uygulamayı GitHub bağlantısından açın. Doğrudan stok artırma kapalıdır."
        );
      }

      const product = await serverCall(
        "getProduct",
        barcode,
        state.token
      );

      if (!product) {
        const productError = new Error("Bu barkoda ait ürün bulunamadı.");
        productError.code = "PRODUCT_NOT_FOUND";
        throw productError;
      }

      sendCameraReply({
        source: "HOCA_MOBILYA_APP",
        type: "ADD_PRODUCT_TO_BATCH",
        product: product,
        quantity: 1
      });

      state.cameraScanCount += 1;
      $("cameraScanCount").textContent = String(state.cameraScanCount);
      $("cameraLastResult").textContent = "Onay listesine eklendi";
      setCameraStatus(
        "Ürün onay listesine eklendi. Stok henüz değişmedi.",
        "success"
      );
      setCameraMessage(
        "Aynı ürünü yeniden okutabilirsiniz; stok yalnızca son onayda değişir.",
        "success"
      );

      state.cameraRecent.unshift({
        barcode: barcode,
        newStock: product.stock,
        message: (product.model || source) + " • Onay bekliyor",
        time: new Date().toLocaleTimeString("tr-TR", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        })
      });
      renderCameraRecent();
      playCameraBeep(true);
    } catch (error) {
      $("cameraLastResult").textContent = "Hata: " + error.message;
      setCameraStatus(error.message, "error");
      setCameraMessage(error.message, "error");
      playCameraBeep(false);

      if (error && error.code === "PRODUCT_NOT_FOUND") {
        state.pendingUnknownProduct = {
          barcode: barcode,
          scanId: "native-" + Date.now()
        };
        openUnknownProductModal(barcode);
      }
    } finally {
      window.setTimeout(() => {
        state.cameraBusy = false;
      }, 650);
    }
  }

  async function startNativeCamera() {
    let requestedFormats = [
      "ean_13",
      "ean_8",
      "code_128",
      "code_39",
      "upc_a",
      "upc_e",
      "itf"
    ];

    if (BarcodeDetector.getSupportedFormats) {
      const supportedFormats =
        await BarcodeDetector.getSupportedFormats();

      requestedFormats = requestedFormats.filter(
        format => supportedFormats.includes(format)
      );
    }

    state.barcodeDetector = requestedFormats.length
      ? new BarcodeDetector({ formats: requestedFormats })
      : new BarcodeDetector();

    const selectedDevice = $("cameraDeviceSelect").value;
    const videoConstraints = selectedDevice
      ? { deviceId: { exact: selectedDevice } }
      : {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        };

    state.cameraStream =
      await navigator.mediaDevices.getUserMedia({
        video: videoConstraints,
        audio: false
      });

    const video = $("barcodeCamera");
    video.srcObject = state.cameraStream;
    video.muted = true;
    video.setAttribute("playsinline", "");
    await video.play();

    state.cameraTrack =
      state.cameraStream.getVideoTracks()[0] || null;

    setCameraEngine("native");
    scanCameraFrame();
  }

  async function startZxingCamera() {
    if (
      !window.ZXingBrowser ||
      !window.ZXingBrowser.BrowserMultiFormatReader
    ) {
      throw new Error(
        "Uyumlu barkod okuyucu yüklenemedi. İnternet bağlantısını kontrol edin."
      );
    }

    state.zxingReader =
      new window.ZXingBrowser.BrowserMultiFormatReader();

    const selectedDevice =
      $("cameraDeviceSelect").value || undefined;

    state.zxingControls =
      await state.zxingReader.decodeFromVideoDevice(
        selectedDevice,
        $("barcodeCamera"),
        (result, error, controls) => {
          if (result) {
            processCameraBarcode(
              result.getText(),
              "Kamera"
            );
          }
        }
      );

    const stream = $("barcodeCamera").srcObject;
    state.cameraStream = stream || null;
    state.cameraTrack =
      stream && stream.getVideoTracks
        ? stream.getVideoTracks()[0] || null
        : null;

    setCameraEngine("zxing");
  }

  function updateTorchAvailability() {

    let supported = false;

    try {

          ? state.cameraTrack.getCapabilities()
          : {};

      supported = Boolean(capabilities.torch);

    button.disabled = !supported;

    try {

      await state.cameraTrack.applyConstraints({
        advanced: [{ torch: state.torchEnabled }]

  async function startCameraScanner() {
    if (!CAMERA_ENABLED) {
      showToast("Kamera özelliği geçici olarak pasif durumda.", "error");
      return;
    }

    if (state.cameraRunning) return;

    if (
      !navigator.mediaDevices ||
      !navigator.mediaDevices.getUserMedia
    ) {
      setCameraMessage(
        "Bu tarayıcı kamera kullanımını desteklemiyor.",
        "error"
      );
      return;
    }

    $("toggleCameraButton").disabled = true;
    setCameraMessage("");
    setCameraStatus("Kamera izni bekleniyor...");
    setCameraEngine("");
    $("cameraArea").classList.remove("hidden");

    try {
      resetCameraSession();
      state.cameraRunning = true;

      if ("BarcodeDetector" in window) {
        try {
          await startNativeCamera();
        } catch (nativeError) {
          await stopCameraScanner(false);
          state.cameraRunning = true;
          $("cameraArea").classList.remove("hidden");
          await startZxingCamera();
        }
      } else {
        await startZxingCamera();
      }

      $("toggleCameraButton").textContent = "Kamerayı Durdur";
      $("toggleCameraButton").classList.add("active");
      setCameraStatus("Barkodu çerçevenin içine tutun.");

      await loadCameraDevices();
      updateTorchAvailability();
    } catch (error) {
      await stopCameraScanner(false);

      let message = error && error.message
        ? error.message
        : "Bilinmeyen kamera hatası";

      if (error && error.name === "NotAllowedError") {
        message =
          "Kamera izni verilmedi. Tarayıcıdaki kilit simgesinden kamera iznini Açık yapın.";
      } else if (error && error.name === "NotFoundError") {
        message =
          "Kullanılabilir kamera bulunamadı.";
      } else if (error && error.name === "NotReadableError") {
        message =
          "Kamera başka bir uygulama tarafından kullanılıyor olabilir.";
      } else if (error && error.name === "OverconstrainedError") {
        message =
          "Seçilen kamera ayarları cihazla uyumlu değil.";
      } else if (error && (error.name === "SecurityError" || /permission policy|not allowed in this document/i.test(message))) {
        message =
          "Tarayıcı bu gömülü sayfada kamera kullanımını engelledi. Bağlantıyı Chrome/Safari içinde doğrudan açın; WhatsApp veya Instagram iç tarayıcısını kullanmayın.";
      } else if (!window.isSecureContext) {
        message =
          "Kamera yalnızca güvenli HTTPS bağlantısında çalışır.";
      }

      setCameraMessage(
        "Kamera açılamadı: " + message,
        "error"
      );
      setCameraStatus("Kamera başlatılamadı.", "error");
    } finally {
      $("toggleCameraButton").disabled = false;
    }
  }

  async function stopCameraScanner(hideArea = true) {
    state.cameraRunning = false;
    state.cameraBusy = false;
    state.torchEnabled = false;

    if (state.zxingControls) {
      try {
        state.zxingControls.stop();
      } catch (error) {}
    }

    if (state.zxingReader) {
      try {
        state.zxingReader.reset();
      } catch (error) {}
    }

    state.zxingControls = null;
    state.zxingReader = null;

    if (state.cameraStream) {
      state.cameraStream
        .getTracks()
        .forEach(track => track.stop());
    }

    state.cameraStream = null;
    state.cameraTrack = null;

    const video = $("barcodeCamera");
    if (video) video.srcObject = null;

    if (hideArea && $("cameraArea")) {
      $("cameraArea").classList.add("hidden");
    }

    $("toggleCameraButton").textContent = "Kamerayı Başlat";
    $("toggleCameraButton").classList.remove("active");
    $("toggleTorchButton").disabled = true;
    $("toggleTorchButton").textContent = "Feneri Aç";
  }

  async function scanCameraFrame() {
    if (!state.cameraRunning) {
      return;
    }

    const video = $("barcodeCamera");

    if (
      state.cameraEngine === "native" &&
      video &&
      video.readyState >= 2 &&
      !state.cameraBusy
    ) {
      try {
        const barcodes =
          await state.barcodeDetector.detect(video);

        if (barcodes && barcodes.length) {
          processCameraBarcode(
            String(barcodes[0].rawValue || ""),
            "Kamera"
          );
        }
      } catch (error) {
        // Bir kare okunamazsa sonraki karede devam edilir.
      }
    }

    if (state.cameraEngine === "native") {
      window.requestAnimationFrame(scanCameraFrame);
    }
  }

      const selected = select.value;

      select.innerHTML = '<option value="">Arka kamera (otomatik)</option>';

      cameras.forEach((camera, index) => {

        select.value = selected;

  async function startStockCameraScanner() {
    if (!CAMERA_ENABLED) {
      showToast("Kamera özelliği geçici olarak pasif durumda.", "error");
      return;
    }

    if (state.stockCameraRunning) return;

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStockCameraMessage("Bu tarayıcı kamera kullanımını desteklemiyor.", "error");
      return;
    }

    state.stockCameraRunning = true;
    state.stockCameraBusy = false;
    setStockCameraMessage("");
    setStockCameraStatus("Kamera izni bekleniyor...");
    setStockCameraEngine("");

    try {
      if ("BarcodeDetector" in window) {
        try {
          await startStockNativeCamera();
        } catch (error) {
          await stopStockCameraScanner();
          state.stockCameraRunning = true;
          await startStockZxingCamera();
        }
      } else {
        await startStockZxingCamera();
      }

      setStockCameraStatus("Barkodu turuncu çerçevenin içine tutun.");
      await loadStockCameraDevices();
      updateStockTorchButton();
    } catch (error) {
      await stopStockCameraScanner();

      let message = error.message || "Kamera başlatılamadı.";
      if (error.name === "NotAllowedError") {
        message = "Kamera izni verilmedi. Tarayıcıdan kamera iznini açın.";
      } else if (error.name === "NotFoundError") {
        message = "Kullanılabilir kamera bulunamadı.";
      } else if (error.name === "NotReadableError") {
        message = "Kamera başka bir uygulama tarafından kullanılıyor olabilir.";
      }

      setStockCameraStatus("Kamera başlatılamadı.", "error");
      setStockCameraMessage(message, "error");
    }
  }

  async function stopStockCameraScanner() {
    state.stockCameraRunning = false;
    state.stockCameraTorchEnabled = false;

    if (state.stockCameraControls) {
      try { state.stockCameraControls.stop(); } catch (error) {}
    }

    if (state.stockCameraReader) {
      try { state.stockCameraReader.reset(); } catch (error) {}
    }

    if (state.stockCameraStream) {
      state.stockCameraStream.getTracks().forEach(track => track.stop());
    }

    state.stockCameraControls = null;
    state.stockCameraReader = null;
    state.stockCameraStream = null;
    state.stockCameraTrack = null;

    const video = $("stockBarcodeCamera");
    if (video) video.srcObject = null;

    updateStockTorchButton();
  }

  async function scanStockCameraFrame() {
    if (!state.stockCameraRunning) return;

    const video = $("stockBarcodeCamera");

    if (
      state.stockCameraEngine === "native" &&
      video.readyState >= 2 &&
      !state.stockCameraBusy

        }

      requestAnimationFrame(scanStockCameraFrame);

  }

  function renderPersonnelCards() {
    const list = $("personnelCardList");
    const empty = $("personnelEmpty");
    const query = (state.personnelSearchQuery || "").toLocaleLowerCase("tr-TR");
    const records = (state.personnelRecords || []).filter(record => {
      const haystack = [record.personnel, record.role, record.active === "Evet" ? "aktif" : "pasif"].join(" ").toLocaleLowerCase("tr-TR");
      return !query || haystack.includes(query);
    });
    list.innerHTML = "";
    $("personnelCountBadge").textContent = state.personnelRecords.length + " personel";
    empty.classList.toggle("hidden", records.length > 0);
    records.forEach(record => {
      const button = document.createElement("button");

  function getFilteredProductReportRecords() {
    const category = $("productReportCategoryFilter").value;
    const stockFilter = $("productReportStockFilter").value;
    const query = normalizeReportText($("productReportSearchInput").value);
    const sort = $("productReportSort").value;
    const records = state.productReportRecords.filter(item => {
      const stock = Number(item.stock || 0);
      const critical = Number(item.critical || 0);
      const haystack = normalizeReportText([item.type,item.model,item.size,item.color,item.barcode,item.code].join(" "));
      const stockMatch = !stockFilter ||
        (stockFilter === "inStock" && stock > 0) ||
        (stockFilter === "outOfStock" && stock === 0) ||
        (stockFilter === "critical" && stock <= critical);
      return (!category || item.type === category) && stockMatch && (!query || haystack.includes(query));
    });
    records.sort((a,b) => {
      if (sort === "stockDesc") return Number(b.stock||0)-Number(a.stock||0);
      if (sort === "stockAsc") return Number(a.stock||0)-Number(b.stock||0);
      return [a.type,a.model,a.size,a.color].join(" ").localeCompare([b.type,b.model,b.size,b.color].join(" "), "tr");
    });
    return records;
  }

  }

  async function updatePersonnel(event) {
    event.preventDefault();
    const button = $("updatePersonnelButton");
    const originalPersonnel = $("editPersonnelOriginalName").value.trim();
    const data = {
      originalPersonnel,
      personnel: $("editPersonnelName").value.trim(),
      role: $("editPersonnelRole").value,
      active: $("editPersonnelActive").value
    };

    button.disabled = true;
    button.textContent = "Güncelleniyor...";
    setPersonnelMessage("editPersonnelMessage", "");

    try {
      const result = await serverCall("adminUpdatePersonnel", data, state.token);
      if (!result || !result.success) {
        throw new Error(result && result.message ? result.message : "Personel güncellenemedi.");
      }

      state.selectedPersonnelRecord = { personnel: data.personnel };
      setPersonnelMessage("editPersonnelMessage", result.message, "success");
      await loadPersonnelManagement(false);
      await loadPersonnel();
    } catch (error) {
      setPersonnelMessage("editPersonnelMessage", error.message, "error");
    } finally {
      button.disabled = false;
      button.textContent = "Bilgileri Güncelle";
    }
  }

  async function changePersonnelPin() {
    const personnel = $("editPersonnelOriginalName").value.trim();
    const newPin = $("editPersonnelNewPin").value.trim();
    const button = $("changePersonnelPinButton");

    if (!personnel) {
      setPersonnelMessage("editPersonnelMessage", "Önce bir personel seçin.", "error");
      return;
    }

    if (!newPin) {
      setPersonnelMessage("editPersonnelMessage", "Yeni PIN girilmelidir.", "error");
      return;
    }

    button.disabled = true;
    button.textContent = "PIN değiştiriliyor...";
    setPersonnelMessage("editPersonnelMessage", "");

    try {
      const result = await serverCall("adminChangePersonnelPin", personnel, newPin, state.token);
      if (!result || !result.success) {
        throw new Error(result && result.message ? result.message : "PIN değiştirilemedi.");
      }
      $("editPersonnelNewPin").value = "";
      setPersonnelMessage("editPersonnelMessage", result.message, "success");
    } catch (error) {
      setPersonnelMessage("editPersonnelMessage", error.message, "error");
    } finally {
      button.disabled = false;
      button.textContent = "PIN'i Değiştir";
    }
  }

    );

    $("stockBarcode").addEventListener(
      "keydown",
      (event) => {
        const suggestionsVisible = !$("stockProductSuggestions").classList.contains("hidden");
        const resultCount = state.stockSearchResults.length;

        if (suggestionsVisible && resultCount && event.key === "ArrowDown") {
          event.preventDefault();
          setActiveStockSuggestion(
            state.stockSearchActiveIndex < resultCount - 1
              ? state.stockSearchActiveIndex + 1
              : 0
          );
          return;
        }

        if (suggestionsVisible && resultCount && event.key === "ArrowUp") {
          event.preventDefault();
          setActiveStockSuggestion(
            state.stockSearchActiveIndex > 0
              ? state.stockSearchActiveIndex - 1
              : resultCount - 1
          );
          return;
        }

        if (event.key === "Escape") {
          hideStockProductSuggestions();
          return;
        }

        if (event.key === "Enter") {
          event.preventDefault();
          if (suggestionsVisible && resultCount) {
            const index = state.stockSearchActiveIndex >= 0
              ? state.stockSearchActiveIndex
              : 0;
            selectStockSearchProduct(state.stockSearchResults[index]);
          } else {
            findStockProduct(true);
          }
        }
      }
    );

        if (state.stockSelectedFromSuggestion) {
